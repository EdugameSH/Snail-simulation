<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>뱅글뱅글 달팽이 키우기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Gowun Dodum', sans-serif;
  background: #c8e6c9;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ===== 전체 게임 컨테이너 (가로형) ===== */
#game-container {
  position: relative;
  /* 가로형: 화면에 꽉 차게, 최대 900×560 */
  width: min(900px, 100vw);
  height: min(560px, 100vh);
  background: linear-gradient(160deg, #87ceeb 0%, #b8dff5 40%, #c8e6c9 70%, #a5d6a7 100%);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}

/* 장식 */
.deco-leaf {
  position: absolute; font-size:20px; opacity:0.3;
  pointer-events:none; z-index:1;
  animation: floatLeaf 6s ease-in-out infinite;
}
@keyframes floatLeaf {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-10px) rotate(8deg); }
}

/* ===== 타이틀 ===== */
#title-screen {
  position: absolute; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: linear-gradient(160deg, #e8f5e9, #f1f8e9, #dcedc8);
  border-radius: 20px;
}
.title-snail {
  font-size: 72px;
  animation: snailBounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
@keyframes snailBounce {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-12px) rotate(5deg); }
}
.game-title {
  font-family: 'Jua', sans-serif;
  font-size: clamp(24px, 4vw, 34px);
  color: #2e7d32; text-align: center; line-height: 1.3;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
}
.game-subtitle { font-size:13px; color:#558b2f; opacity:0.85; }
.start-btn {
  margin-top: 10px;
  background: #4caf50; color: white; border: none;
  padding: 14px 44px; border-radius: 50px;
  font-family: 'Jua', sans-serif; font-size: 20px;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 5px 0 #388e3c, 0 7px 14px rgba(0,0,0,0.2);
  transition: all 0.1s;
}
.start-btn:hover  { transform: translateY(2px); box-shadow: 0 3px 0 #388e3c; }
.start-btn:active { transform: translateY(5px); box-shadow: none; }

/* ===== 게임 화면 ===== */
#game-screen {
  position: absolute; inset: 0;
  display: none;
}

/* 진행 바 */
#progress-bar {
  position: absolute; top:0; left:0; right:0; height:4px;
  background: rgba(255,255,255,0.35); z-index:30;
}
#progress-fill {
  height:100%;
  background: linear-gradient(90deg, #4caf50, #8bc34a);
  transition: width 0.6s ease;
}

/* ===== 가로 분할 레이아웃 ===== */
/* 왼쪽: 플레이박스 (사육상자 영역) */
#play-area {
  position: absolute;
  top: 4px; bottom: 0; left: 0;
  /* 오른쪽 패널 너비(270px) 제외 */
  right: 270px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 12px 12px;
}

/* 사육상자 래퍼 — play-area 안에서 최대한 크게 */
#terrarium-wrap {
  position: relative;
  width: 100%;
  max-width: 520px;
  display: none;
}
#terrarium-img {
  width: 100%; height: auto; display: block;
  transition: opacity 0.4s;
}

/* 은신처 */
#hide-item {
  position: absolute;
  bottom: 18%; left: 70%;
  transform: translateX(-50%);
  width: 40% !important; max-width: 176px !important; height: auto !important;
  display: none;
  animation: itemAppear 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 6;
  transition: opacity 0.3s;
}
#hide-item.preview { opacity: 0.5; }
@keyframes itemAppear {
  from { transform: translateX(-50%) scale(0) rotate(-15deg); opacity:0; }
  to   { transform: translateX(-50%) scale(1) rotate(0deg);   opacity:1; }
}

/* 코코피트 봉투 (드래그 중 절대위치) */
#coco-bag {
  position: absolute;
  width: 70px;
  cursor: grab;
  z-index: 25;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
  user-select: none; display: none;
  touch-action: none;
}
#coco-bag:active { cursor: grabbing; }

/* 패널 내 봉투 정적 표시 */
#coco-bag-static {
  width: 64px; height: auto;
  cursor: grab;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
  user-select: none; touch-action: none;
  display: block; margin: 8px auto 4px;
}

#drop-hint {
  position: absolute;
  font-size: 11px; color: #5d4037;
  background: rgba(255,255,255,0.92);
  padding: 3px 8px; border-radius: 20px;
  pointer-events: none; display: none;
  z-index: 26; white-space: nowrap;
  font-family: 'Jua', sans-serif;
}

/* 물방울 날아가기 */
@keyframes dropFly {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.9; }
  80%  { opacity: 0.6; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
}

/* 분무기 흔들기 */
@keyframes sprayShake {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-12deg) translateX(-4px); }
  50%  { transform: rotate(8deg)  translateX(2px); }
  75%  { transform: rotate(-5deg); }
  100% { transform: rotate(0deg); }
}

/* 스턴 별 */
@keyframes stunStar {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-22px) scale(0.6); opacity: 0; }
}

/* 달팽이 사망 */
@keyframes snailDie {
  0%   { transform: rotate(0deg) scale(1); opacity:1; }
  20%  { transform: rotate(-15deg) scale(1.05); }
  40%  { transform: rotate(12deg) scale(0.95); }
  60%  { transform: rotate(-8deg); }
  80%  { transform: rotate(5deg) scale(0.9); opacity:0.8; }
  100% { transform: rotate(0deg) scale(0.85) translateY(4px); opacity:0.5; }
}

/* 은신처 말풍선 */
@keyframes bubbleFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-5px) scale(1.05); }
}

/* ===== 오른쪽 패널 ===== */
#side-panel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 270px;
  background: rgba(255,255,255,0.96);
  border-radius: 0 20px 20px 0;
  box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  padding: 20px 16px 16px;
  overflow-y: auto;
  z-index: 20;
  display: flex;
  flex-direction: column;
}

.step-badge {
  display: inline-block;
  background: #4caf50; color: white;
  font-family: 'Jua', sans-serif; font-size: 11px;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
}
.panel-title {
  font-family: 'Jua', sans-serif; font-size: 15px;
  color: #1b5e20; margin-bottom: 6px; line-height: 1.4;
}
.panel-desc {
  font-size: 11px; color: #777;
  margin-bottom: 10px; line-height: 1.5;
}
.info-box {
  background: #e8f5e9;
  border-left: 4px solid #4caf50;
  border-radius: 0 10px 10px 0;
  padding: 9px 11px;
  font-size: 12px; color: #2e7d32;
  margin-bottom: 12px; line-height: 1.6;
}

/* 사육상자 선택 */
.box-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 7px;
}
.box-option {
  background: white; border: 2px solid #e0e0e0;
  border-radius: 12px; padding: 7px 4px;
  cursor: pointer; text-align: center; transition: all 0.2s;
}
.box-option:hover { border-color:#4caf50; transform:translateY(-3px); box-shadow:0 5px 12px rgba(76,175,80,0.2); }
.box-option.selected { border-color:#4caf50; background:#f1f8e9; }
.box-option img { width:100%; height:52px; object-fit:contain; }
.box-option span { display:block; font-size:10px; color:#555; margin-top:2px; }

/* 은신처 선택 */
.hide-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 7px;
}
.hide-option {
  background: white; border: 2px solid #e0e0e0;
  border-radius: 12px; padding: 7px 4px;
  cursor: pointer; text-align: center; transition: all 0.2s;
}
.hide-option:hover { border-color:#4caf50; transform:translateY(-3px); box-shadow:0 5px 12px rgba(76,175,80,0.2); }
.hide-option.selected { border-color:#4caf50; background:#f1f8e9; }
.hide-option img { width:100%; height:72px; object-fit:contain; }
.hide-option span { display:block; font-size:10px; color:#555; margin-top:2px; }

/* 버튼 */
.next-btn {
  display:block; width:100%; margin-top:10px;
  background:#4caf50; color:white; border:none;
  padding:11px; border-radius:10px;
  font-family:'Jua',sans-serif; font-size:15px;
  cursor:pointer; box-shadow:0 3px 0 #388e3c;
  transition:all 0.1s;
}
.next-btn:hover  { transform:translateY(2px); box-shadow:0 1px 0 #388e3c; }
.next-btn:active { transform:translateY(3px); box-shadow:none; }
.next-btn:disabled { background:#bdbdbd; box-shadow:0 3px 0 #9e9e9e; cursor:not-allowed; transform:none; }

/* ===== 퀴즈 팝업 (플레이박스 위) ===== */
#quiz-popup {
  position: absolute;
  /* play-area 안에서 중앙 */
  top: 50%; left: calc(50% - 135px); /* play-area 중앙, right:270px 고려 */
  transform: translate(-50%, -50%);
  width: min(360px, calc(100vw - 290px));
  background: rgba(255,255,255,0.97);
  border-radius: 20px;
  padding: 22px 20px 18px;
  box-shadow: 0 8px 36px rgba(0,0,0,0.18);
  z-index: 40;
  display: none;
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform: translate(-50%,-50%) scale(0.5); opacity:0; }
  to   { transform: translate(-50%,-50%) scale(1);   opacity:1; }
}
.quiz-badge {
  display:inline-block; background:#ff8f00; color:white;
  font-family:'Jua',sans-serif; font-size:11px;
  padding:3px 10px; border-radius:20px; margin-bottom:8px;
}
.quiz-title {
  font-family:'Jua',sans-serif; font-size:15px;
  color:#1b5e20; margin-bottom:10px; line-height:1.4;
}
.choices { display:flex; flex-direction:column; gap:6px; }
.choice-btn {
  background:#f1f8e9; border:2px solid #c5e1a5;
  border-radius:10px; padding:9px 12px;
  font-family:'Gowun Dodum',sans-serif; font-size:12px;
  color:#33691e; cursor:pointer; text-align:left;
  transition:all 0.2s; line-height:1.4;
}
.choice-btn:hover  { background:#dcedc8; border-color:#8bc34a; transform:translateX(3px); }
.choice-btn.correct { background:#e8f5e9; border-color:#4caf50; color:#1b5e20; animation:correctFlash 0.5s; }
.choice-btn.wrong   { background:#ffebee; border-color:#ef5350; color:#c62828; animation:shake 0.4s; }

@keyframes correctFlash {
  0%,100% { background:#e8f5e9; }
  50%      { background:#a5d6a7; }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25%      { transform:translateX(-5px); }
  75%      { transform:translateX(5px); }
}

/* 피드백 토스트 (플레이박스 상단) */
#feedback-toast {
  position: absolute;
  top: 14%; left: calc(50% - 135px);
  transform: translateX(-50%);
  background: white; border-radius: 30px;
  padding: 10px 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 50; font-family: 'Jua', sans-serif; font-size: 16px;
  display: none; white-space: nowrap;
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes toastIn {
  from { transform: translateX(-50%) translateY(-10px); opacity:0; }
  to   { transform: translateX(-50%) translateY(0);     opacity:1; }
}
</style>
</head>
<body>
<div id="game-container">

  <span class="deco-leaf" style="top:6%;left:4%;animation-delay:0s">🍃</span>
  <span class="deco-leaf" style="top:10%;left:30%;animation-delay:2s">🌿</span>
  <span class="deco-leaf" style="top:4%;left:55%;animation-delay:4s">☘️</span>

  <!-- 타이틀 -->
  <div id="title-screen">
    <div class="title-snail">🐌</div>
    <div class="game-title">뱅글뱅글 달팽이 키우기</div>
    <div class="game-subtitle">나만의 달팽이 친구를 만들어봐요!</div>
    <button class="start-btn" onclick="startGame()">시작하기 🌿</button>
  </div>

  <!-- 게임 화면 -->
  <div id="game-screen">
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

    <!-- 왼쪽: 플레이박스 -->
    <div id="play-area">
      <div id="terrarium-wrap">
        <img id="terrarium-img" src="" alt="사육상자">
        <img id="hide-item" src="" alt="은신처">
        <!-- 먹이 -->
        <img id="food-img" src="" alt="먹이" style="position:absolute;display:none;
          bottom:22%;left:8%;width:45%;max-width:200px;height:auto;z-index:7;
          filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
        <!-- 칼슘제 가루 (먹이 중앙 위) -->
        <img id="calcium-powder-img" src="images/칼슘제가루.png" alt="칼슘가루" style="position:absolute;display:none;
          bottom:30%;left:18%;width:22%;max-width:95px;height:auto;z-index:8;opacity:0.85;
          filter:drop-shadow(0 1px 3px rgba(0,0,0,0.15));">
        <!-- 똥 SVG 캔버스 -->
        <svg id="poop-svg" style="position:absolute;inset:0;width:100%;height:100%;z-index:7;pointer-events:none;overflow:visible;"></svg>
        <!-- 달팽이 -->
        <img id="snail-img" src="images/기본달팽이1.png" alt="달팽이" draggable="false"
          style="position:absolute; display:none; z-index:9;
                 width:11%; max-width:50px; height:auto;
                 transition: none; cursor:pointer;
                 filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));"
          onclick="stunSnail(event)">
      </div>
    </div>

    <!-- 코코피트 봉투 (드래그 중 절대위치용) -->
    <img id="coco-bag" src="images/코코피트봉투.png" alt="코코피트" draggable="false">
    <!-- 분무기 (드래그 중 절대위치용) -->
    <img id="spray-bag" src="images/분무기.png" alt="분무기" draggable="false"
      style="position:absolute;width:70px;cursor:grab;z-index:25;
             filter:drop-shadow(0 4px 8px rgba(0,0,0,0.25));
             user-select:none;display:none;touch-action:none;">
    <div id="drop-hint">📦 사육상자로 드래그!</div>

    <!-- 퀴즈 팝업 -->
    <div id="quiz-popup"></div>

    <!-- 피드백 토스트 -->
    <div id="feedback-toast"></div>

    <!-- 오른쪽: 사이드 패널 -->
    <div id="side-panel"></div>
  </div>

</div>
<script>
const IMGS = {
  box_green:    'images/사육상자초록.png',
  box_yellow:   'images/사육상자노랑.png',
  box_blue:     'images/사육상자파랑.png',
  coco_green:   'images/코코피트사육상자초록.png',
  coco_yellow:  'images/코코피트사육상자노랑.png',
  coco_blue:    'images/코코피트사육상자파랑.png',
  hide_mushroom:'images/버섯은신처.png',
  hide_pumpkin: 'images/호박은신처.png',
  hide_coconut: 'images/코코넛은신처.png',
  spray:        'images/분무기.png',
  snail1:       'images/기본달팽이1.png',
  snail2:       'images/기본달팽이2.png',
  snailStun:    'images/스턴달팽이.png',
  snailShell:   'images/달팽이껍질.png',
  snailRaise:   'images/고개든달팽이.png',
  wallSnail1:   'images/벽달팽이1.png',
  wallSnail2:   'images/벽달팽이2.png',
  // 먹이
  lettuce1: 'images/상추1.png', lettuce2: 'images/상추2.png',
  lettuce3: 'images/상추3.png', lettuce4: 'images/상추4.png',
  carrot1:  'images/당근1.png', carrot2:  'images/당근2.png',
  carrot3:  'images/당근3.png',
  calcium:  'images/칼슘제.png',
  calciumPowder: 'images/칼슘제가루.png',
};

let gameState = { step:0, selectedBox:null, selectedHide:null, humidity:0, hunger:100, happiness:100, snailName:'' };
const STEPS = ['quiz1','boxSelect','quiz2','cocopeat','hideSelect','spray','snail'];

// 게이지 타이머
let humidityTimer = null;
let statDrainTimer = null;

// 게이지 감소 속도 (초당 %)
const HUMIDITY_MAX     = 100;
const HUMIDITY_DRAIN   = 0.8;
const HUNGER_DRAIN     = 0.8;
const HAPPINESS_DRAIN  = 0.3;
const HUMIDITY_PER_SPRAY = 25;

// 달팽이 이동
let snailAnimTimer = null;

// 달팽이 사망 관련
let snailDead = false;
let lifeWarningCount = 0;
let lifeWarningShown = false;
let stunCount = 0;          // 스턴 횟수
let dryTimer = 0;           // 연속 건조 누적 시간(초)
let dryDeathTimer = null;   // 건조 사망 타이머

// 은신처 관련
let snailInHide = false;
let hideRoutineRunning = false;

// 벽 타기 관련
let snailMode = 'ground'; // 'ground' | 'raising' | 'wall' | 'descending'
let wallModeActive = false;

// 먹이 관련
let currentFood = null;
let foodOnStage = false;
let calciumOnFood = false;
let feedCount = 0;
let quizShown = false;
let snailOnFoodTimer = 0;
let foodStageInterval = null;
let lastFoodType = null;   // 마지막 먹은 먹이 색상용

// 똥 관련
let poopCount = 0;
let poopActive = false;
let poopPath = [];
let poopTimer = 0;
const POOP_DURATION = 3000;
let poopSegments = [];       // [{points:[{px,py},...], color}]
let needsCleaning = false;

// 성장 관련
let actionCount = 0;
let growth1Done = false;
let growth2Done = false;
let snailSizeW = 11;

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  renderStep();
}

function setProgress(n) {
  document.getElementById('progress-fill').style.width = (n / STEPS.length * 100) + '%';
}

function renderStep() {
  const step = STEPS[gameState.step];
  setProgress(gameState.step);
  document.getElementById('quiz-popup').style.display = 'none';

  if (step === 'quiz1') {
    setSidePanel('');  // 패널 비움
    showQuizPopup(
      '퀴즈 1',
      '달팽이는 어디서 키워야 할까요? 🐌',
      [
        { text: '① 자유롭게 움직일 수 있는 방바닥', correct: false },
        { text: '② 달팽이가 탈출하지 못하도록 뚜껑이 달린 사육상자', correct: true },
        { text: '③ 달팽이와 손쉽게 교감할 수 있는 넓은 쟁반', correct: false },
      ]
    );

  } else if (step === 'boxSelect') {
    setSidePanel(`
      <div class="step-badge">🏠 사육상자 선택</div>
      <div class="info-box">달팽이가 밖으로 나오지 않도록 뚜껑이 있는 사육상자를 준비합니다.</div>

function showQuizPopup(badge, question, options) {
  const popup = document.getElementById('quiz-popup');
  const choicesHtml = options.map((o, i) =>
    `<button class="choice-btn" onclick="answerQuiz(this,${o.correct})">${o.text}</button>`
  ).join('');
  popup.innerHTML = `
    <div class="quiz-badge">📚 ${badge}</div>
    <div class="quiz-title">${question}</div>
    <div class="choices">${choicesHtml}</div>
  `;
  popup.style.display = 'block';
}

function answerQuiz(btn, isCorrect) {
  btn.closest('.choices').querySelectorAll('.choice-btn')
     .forEach(b => b.style.pointerEvents = 'none');
  if (isCorrect) {
    btn.classList.add('correct');
    btn.innerHTML = '✅ ' + btn.textContent + ' 정답!';
    showToast('🎉 정답이에요!', '#e8f5e9', '#2e7d32');
    setTimeout(() => {
      hideToast();
      document.getElementById('quiz-popup').style.display = 'none';
      gameState.step++;
      renderStep();
    }, 1400);
  } else {
    btn.classList.add('wrong');
    showToast('❌ 다시 생각해봐요!', '#ffebee', '#c62828');
    setTimeout(() => {
      hideToast();
      btn.classList.remove('wrong');
      btn.closest('.choices').querySelectorAll('.choice-btn')
         .forEach(b => b.style.pointerEvents = '');
    }, 900);
  }
}

function initCocoDrag(staticEl) {
  let dragging = false, ox, oy;
  const bag = document.getElementById('coco-bag');

  function getPos(e) { return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }

  function onStart(e) {
    e.preventDefault();
    dragging = true;
    const p = getPos(e);
    const sr = staticEl.getBoundingClientRect();
    ox = p.x - sr.left; oy = p.y - sr.top;

    // 같은 위치에 절대위치 봉투 띄우고 정적 봉투 숨기기
    const cr = document.getElementById('game-container').getBoundingClientRect();
    bag.style.left = (sr.left - cr.left) + 'px';
    bag.style.top  = (sr.top  - cr.top)  + 'px';
    bag.style.transition = 'none';
    bag.style.display = 'block';
    staticEl.style.opacity = '0';
  }
  function onMove(e) {
    if (!dragging) return; e.preventDefault();
    const p = getPos(e), cr = document.getElementById('game-container').getBoundingClientRect();
    bag.style.left = (p.x - cr.left - ox) + 'px';
    bag.style.top  = (p.y - cr.top  - oy) + 'px';
  }
  function onEnd() {
    if (!dragging) return; dragging = false;
    const er = bag.getBoundingClientRect();
    const cr = document.getElementById('game-container').getBoundingClientRect();
    const sideW = 270;
    const playW = cr.width - sideW;
    const elCX  = er.left + er.width  / 2 - cr.left;
    const elCY  = er.top  + er.height / 2 - cr.top;

    // 플레이박스 영역(왼쪽)에 드롭됐으면 성공
    // 사이드 패널 영역(오른쪽 270px)만 아니면 OK
    if (elCX < playW) {
      applyCocoPeat();
    } else {
      // 원위치 (패널로 복귀)
      const sr = staticEl.getBoundingClientRect();
      bag.style.transition = 'all 0.35s cubic-bezier(0.34,1.56,0.64,1)';
      bag.style.left = (sr.left - cr.left) + 'px';
      bag.style.top  = (sr.top  - cr.top)  + 'px';
      setTimeout(() => {
        bag.style.display = 'none';
        if (staticEl) staticEl.style.opacity = '1';
      }, 360);
    }
  }

  staticEl.addEventListener('mousedown', onStart);
  staticEl.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

function applyCocoPeat() {
  const bag = document.getElementById('coco-bag');
  bag.style.transition = 'all 0.3s ease';
  bag.style.opacity = '0'; bag.style.transform = 'scale(0.4)';
  const img = document.getElementById('terrarium-img');
  setTimeout(() => {
    img.style.opacity = '0';
    setTimeout(() => {
      img.src = IMGS['coco_' + gameState.selectedBox];
      img.style.opacity = '1';
      bag.style.display = 'none';
      document.getElementById('drop-hint').style.display = 'none';
      showToast('🌱 코코피트 완료!', '#e8f5e9', '#2e7d32');
      setTimeout(() => { hideToast(); gameState.step++; renderStep(); }, 1200);
    }, 300);
  }, 250);
}

// 스턴
let snailStunned = false;
let snailStunTimeout = null;

function stunSnail(e) {
  if (snailStunned || snailDead) return;
  const snail = document.getElementById('snail-img');
  const r = snail.getBoundingClientRect();
  const relX = (e.clientX - r.left) / r.width;
  const facingLeft = !snail.style.transform.includes('scaleX(-1)'); // scaleX(1)이면 머리가 왼쪽
  let isFaceClick;
  if (snailMode === 'wall') {
    const relY = (e.clientY - r.top) / r.height;
    isFaceClick = relY < 0.35;
  } else {
    // 머리가 왼쪽(facingLeft=true)이면 왼쪽 35%가 얼굴, 오른쪽(false)이면 오른쪽 35%가 얼굴
    isFaceClick = facingLeft ? relX < 0.35 : relX > 0.65;
  }
  if (!isFaceClick) return;

  // 은신처 이동 중 → 취소
  if (hideRoutineRunning) {
    hideRoutineRunning = false;
    if (snailAnimTimer) { cancelAnimationFrame(snailAnimTimer); snailAnimTimer = null; }
  }
  // 벽 모드 중 → ground 복귀
  if (snailMode !== 'ground') {
    snailMode = 'ground';
    wallModeActive = false;
    snail.style.width = snailSizeW + '%';
    snail.style.maxWidth = Math.round(snailSizeW * 4.5) + 'px';
    snail.style.transformOrigin = 'center center';
  }

  snailStunned = true;
  stunCount++;
  snail.src = IMGS.snailStun;
  snail.style.width = snailSizeW + '%';
  snail.style.maxWidth = Math.round(snailSizeW * 4.5) + 'px';
  snail.style.transform = 'scaleX(1)';
  snail.style.filter = 'drop-shadow(0 2px 6px rgba(0,0,0,0.2))';
  showStunEffect(snail);

  // 경고 토스트
  showToast('🐌 달팽이의 더듬이를 건드리면 달팽이가 스트레스를 받아요!', '#fff3e0', '#e65100');
  setTimeout(() => hideToast(), 2500);

  gameState.happiness = Math.max(0, gameState.happiness - 10);
  updateSnailStatsUI();
  checkSnailWarnings();

  if (snailStunTimeout) clearTimeout(snailStunTimeout);
  snailStunTimeout = setTimeout(() => {
    if (!snailDead) {
      if (stunCount >= 6) {
        killSnail('stun');
        return;
      }
      // 기존 RAF 완전 중단
      if (snailAnimTimer) { cancelAnimationFrame(snailAnimTimer); snailAnimTimer = null; }
      snailStunned = false;
      const snailEl = document.getElementById('snail-img');
      if (snailEl) {
        snailEl.src = IMGS.snail1;
        snailEl.style.width = snailSizeW + '%';
        snailEl.style.maxWidth = Math.round(snailSizeW * 4.5) + 'px';
        snailEl.style.filter = 'drop-shadow(0 2px 4px rgba(0,0,0,0.15))';
      }
      if (gameState.happiness <= 50 && !snailInHide) {
        hideRoutineRunning = true;
        goToHide(snailEl, () => enterHide(snailEl));
      } else {
        startSnailMovement();
      }
    }
  }, 3000);
}

// ===== 먹이 드래그 =====
function initFoodDrag(btnId, foodType) {
  const staticEl = document.getElementById(btnId);
  if (!staticEl) return;
  const bag = document.getElementById('spray-bag'); // 공용 드래그 엘리먼트 재활용 불가 → 동적 생성
  let dragging = false, ox, oy;
  let dragEl = null;

  function getPos(e) { return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }

  function onStart(e) {
    // 먹이가 이미 있고 칼슘제가 아니면 막기
    if (foodType !== 'calcium' && foodOnStage) {
      showToast('🥬 달팽이가 먹이를 다 먹을 때까지 기다려주세요!', '#fff3e0', '#e65100');
      setTimeout(hideToast, 2000);
      return;
    }
    if (foodType === 'calcium' && !foodOnStage) {
      showToast('🥬 먹이를 먼저 주세요! 칼슘제는 먹이와 함께 줄 수 있어요.', '#fff3e0', '#e65100');
      setTimeout(hideToast, 2200);
      return;
    }
    if (foodType === 'calcium' && calciumOnFood) {
      showToast('칼슘제가 이미 뿌려져 있어요.', '#fff3e0', '#e65100');
      setTimeout(hideToast, 1500);
      return;
    }
    e.preventDefault(); dragging = true;
    const p = getPos(e), sr = staticEl.getBoundingClientRect();
    ox = p.x - sr.left; oy = p.y - sr.top;
    // 임시 드래그 이미지 생성
    dragEl = document.createElement('img');
    dragEl.src = staticEl.src;
    dragEl.style.cssText = `position:absolute;width:50px;height:50px;object-fit:contain;
      z-index:60;pointer-events:none;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));`;
    const cr = document.getElementById('game-container').getBoundingClientRect();
    dragEl.style.left = (sr.left - cr.left) + 'px';
    dragEl.style.top  = (sr.top  - cr.top)  + 'px';
    document.getElementById('game-container').appendChild(dragEl);
  }
  function onMove(e) {
    if (!dragging || !dragEl) return; e.preventDefault();
    const p = getPos(e), cr = document.getElementById('game-container').getBoundingClientRect();
    dragEl.style.left = (p.x - cr.left - ox) + 'px';
    dragEl.style.top  = (p.y - cr.top  - oy) + 'px';
  }
  function onEnd(e) {
    if (!dragging || !dragEl) return; dragging = false;
    const er = dragEl.getBoundingClientRect();
    const cr = document.getElementById('game-container').getBoundingClientRect();
    const playW = cr.width - 270;
    const elCX = er.left + er.width/2 - cr.left;
    dragEl.remove(); dragEl = null;

    if (elCX < playW) {
      if (foodType === 'calcium') {
        applyCalcium();
      } else {
        placeFood(foodType);
      }
    }
  }
  staticEl.addEventListener('mousedown', onStart);
  staticEl.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

function placeFood(type) {
  if (foodOnStage) return;
  foodOnStage = true;
  calciumOnFood = false;
  currentFood = { type, stage: 1 };
  snailOnFoodTimer = 0;

  // 배고픔 게이지 체크 & 안내
  feedCount++;
  actionCount++;
  checkGrowth();

  // 사이드패널 안내문구 (노란 배너)
  const infoFood = document.getElementById('info-food-warn');
  if (infoFood) {
    infoFood.style.display = 'block';
    setTimeout(() => { infoFood.style.display = 'none'; }, 3000);
  }

  // 3번째 먹이 시 퀴즈 (한 번만)
  if (feedCount === 3 && !quizShown) {
    quizShown = true;
    setTimeout(() => showFoodQuiz(), 3000);
  }

  const foodImg = document.getElementById('food-img');
  const imgMap = { lettuce: IMGS.lettuce1, carrot: IMGS.carrot1 };
  foodImg.src = imgMap[type];
  foodImg.style.display = 'block';

  // 먹이 섭취 타이머 시작
  startFoodTimer();
}

function applyCalcium() {
  calciumOnFood = true;
  const pw = document.getElementById('calcium-powder-img');
  if (pw) pw.style.display = 'block';
  showToast('🐚 칼슘제는 달팽이 껍데기를 단단하게 만드는데 도움이 됩니다.', '#f3e5f5', '#6a1b9a');
  setTimeout(hideToast, 2800);
}

function startFoodTimer() {
  if (foodStageInterval) clearInterval(foodStageInterval);
  snailOnFoodTimer = 0;

  foodStageInterval = setInterval(() => {
    if (snailDead || !foodOnStage) { clearInterval(foodStageInterval); return; }
    // 스턴 중이거나 은신처 안에 있으면 누적 멈춤
    if (snailStunned || snailInHide) return;
    const snail = document.getElementById('snail-img');
    const sx = parseFloat(snail.style.left) || 0;
    const onFood = sx > 5 && sx < 40 && snailMode === 'ground';
    if (onFood) {
      snailOnFoodTimer += 1000;
      if (snailOnFoodTimer >= 4000) {
        snailOnFoodTimer = 0;
        advanceFoodStage();
      }
    }
  }, 1000);
}

function advanceFoodStage() {
  if (!currentFood || !foodOnStage) return;
  const { type } = currentFood;

  // 단계 변할 때마다 배고픔 +5%, 행복 +3%
  gameState.hunger    = Math.min(100, gameState.hunger    + 5);
  gameState.happiness = Math.min(100, gameState.happiness + 3);
  // 칼슘제가 있었으면 추가 +3%
  if (calciumOnFood) {
    gameState.hunger = Math.min(100, gameState.hunger + 3);
  }
  updateSnailStatsUI();

  currentFood.stage++;

  // 칼슘제 가루 사라짐
  const pw = document.getElementById('calcium-powder-img');
  if (pw) pw.style.display = 'none';
  calciumOnFood = false;

  const foodImg = document.getElementById('food-img');
  const stages = {
    lettuce: [null, IMGS.lettuce1, IMGS.lettuce2, IMGS.lettuce3, IMGS.lettuce4, null],
    carrot:  [null, IMGS.carrot1,  IMGS.carrot2,  IMGS.carrot3,  null],
  };
  const stageList = stages[type];
  const nextSrc = stageList[currentFood.stage];

  if (!nextSrc || currentFood.stage >= stageList.length - 1) {
    // 다 먹음 → 나중에 똥 트리거
    lastFoodType = type;
    foodImg.style.display = 'none';
    foodOnStage = false;
    currentFood = null;
    if (foodStageInterval) { clearInterval(foodStageInterval); foodStageInterval = null; }
    // 10~20초 후 똥 이벤트
    const poopDelay = 10000 + Math.random() * 10000;
    setTimeout(() => {
      if (!snailDead && !poopActive && snailMode === 'ground' && !snailInHide) {
        startPoop();
      }
    }, poopDelay);
  } else {
    foodImg.src = nextSrc;
  }
}

  if (!foodOnStage) return null;

// ===== 똥 시스템 =====
function startPoop() {
  if (poopActive || snailDead) return;
  poopActive = true;
  poopPath = [];
  poopTimer = 0;
}

function recordPoopPoint(snailX, snailY, facingLeft) {
  if (!poopActive) return;
  // 꼬리 위치 = 달팽이 중심에서 진행 방향 반대쪽
  // facingLeft=true(scaleX(1)) → 머리가 왼쪽 → 꼬리는 오른쪽 (+offset)
  const tailOffsetX = facingLeft ? 4 : -4;  // % 단위
  const tailX = snailX + tailOffsetX;
  const tailY = snailY + 3;  // 살짝 아래 (꼬리)

  // 너무 가까운 점은 건너뜀 (최소 0.5% 이상 이동 시 추가)
  if (poopPath.length > 0) {
    const last = poopPath[poopPath.length - 1];
    const d = Math.sqrt((tailX-last.x)**2 + (tailY-last.y)**2);
    if (d < 0.5) return;
  }
  poopPath.push({ x: tailX, y: tailY });
}

function tickPoop(dt) {
  if (!poopActive) return;
  poopTimer += dt;
  if (poopTimer >= POOP_DURATION) {
    finishPoop();
  }
}

function finishPoop() {
  if (!poopActive) { return; }
  poopActive = false;
  if (poopPath.length < 3) { poopPath = []; return; }

  const color = lastFoodType === 'carrot' ? '#c0620a' : '#4a7a28';
  poopSegments.push({ points: [...poopPath], color });
  poopCount++;
  poopPath = [];

  renderAllPoop();

  if (poopCount >= 7 && !needsCleaning) {
    needsCleaning = true;
    showCleaningPrompt();
  }
}

function renderAllPoop() {
  const wrap = document.getElementById('terrarium-wrap');
  const svg  = document.getElementById('poop-svg');
  if (!wrap || !svg) return;

  const W = wrap.offsetWidth;
  const H = wrap.offsetHeight;
  if (!W || !H) return;

  // viewBox를 wrap 실제 픽셀 크기로 설정 → % → px 변환 없이 직접 사용
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');

  svg.innerHTML = poopSegments.map(seg => {
    if (seg.points.length < 2) return '';
    // % 좌표 → px 변환
    // y는 bottom 기준이므로 H - (y/100 * H)
    const pts = seg.points.map(p => ({
      px: (p.x / 100) * W,
      py: H - (p.y / 100) * H
    }));

    // catmull-rom 스플라인으로 부드럽게
    let d = `M ${pts[0].px.toFixed(1)} ${pts[0].py.toFixed(1)}`;
    for (let i = 1; i < pts.length - 1; i++) {
      const cp1x = pts[i-1].px + (pts[i].px - pts[i-1].px) * 0.5;
      const cp1y = pts[i-1].py + (pts[i].py - pts[i-1].py) * 0.5;
      const cp2x = pts[i].px   - (pts[i+1].px - pts[i-1].px) * 0.15;
      const cp2y = pts[i].py   - (pts[i+1].py - pts[i-1].py) * 0.15;
      d += ` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)}, ${cp2x.toFixed(1)} ${cp2y.toFixed(1)}, ${pts[i].px.toFixed(1)} ${pts[i].py.toFixed(1)}`;
    }
    d += ` L ${pts[pts.length-1].px.toFixed(1)} ${pts[pts.length-1].py.toFixed(1)}`;

    return `<path d="${d}" stroke="${seg.color}" stroke-width="3.5"
      stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>`;
  }).join('');
}

function showStunEffect(snail) {
  const container = document.getElementById('terrarium-wrap');
  if (!container) return;
  const r = snail.getBoundingClientRect();
  const cr = container.getBoundingClientRect();
  const cx = r.left - cr.left + r.width * 0.3;
  const cy = r.top  - cr.top  - 8;
  ['⭐','💫','✨'].forEach((s, i) => {
    const el = document.createElement('div');
    el.textContent = s;
    el.style.cssText = `position:absolute;font-size:14px;pointer-events:none;z-index:20;
      left:${cx+(i-1)*16}px;top:${cy}px;
      animation:stunStar 1s ease-out ${i*120}ms forwards;`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  });
}

function killSnail(cause) {
  if (snailDead) return;
  snailDead = true;
  stopStatDrain();
  if (dryDeathTimer) { clearInterval(dryDeathTimer); dryDeathTimer = null; }
  if (snailAnimTimer) { cancelAnimationFrame(snailAnimTimer); snailAnimTimer = null; }

  const snail = document.getElementById('snail-img');
  if (!snail) return;

  snail.style.transition = 'all 0.8s ease';
  snail.style.animation = 'snailDie 0.8s ease forwards';

  setTimeout(() => {
    snail.src = IMGS.snailShell;
    snail.style.animation = '';
    snail.style.width = snailSizeW + '%';
    snail.style.filter = 'drop-shadow(0 2px 4px rgba(0,0,0,0.15))';
    snail.style.transform = 'none';
    snail.onclick = null;

    gameState.humidity = 0; gameState.hunger = 0; gameState.happiness = 0;
    ['snail-humidity-bar','snail-hunger-bar','snail-happiness-bar'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.width = '0%';
    });
    ['warn-humidity','warn-hunger','warn-happiness'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });

    // 원인별 메시지 (4초 후)
    setTimeout(() => {
      if (cause === 'stun') {
        showGamePopup('😵', '작은 생물일수록 스트레스에 큰 영향을 받습니다.\n달팽이가 행복하도록 건드리지 말아주세요.', [{ label:'→', action:'showRestartQuestion' }]);
      } else if (cause === 'dry') {
        showGamePopup('💧', '달팽이는 습도가 매우 중요한 생물입니다.\n촉촉한 환경을 유지해주세요.', [{ label:'→', action:'showRestartQuestion' }]);
      } else if (cause === 'hunger') {
        showGamePopup('🥬', '우리가 배고픔을 느끼듯이 달팽이도 배고픔을 느낍니다.\n달팽이를 굶기지 마세요.', [{ label:'→', action:'showRestartQuestion' }]);
      } else {
        showGamePopup('😔', '작은 생물일지라도 당신의 장난감이 아닙니다.\n달팽이를 좀 더 사랑으로 아껴주세요.', [{ label:'→', action:'showRestartQuestion' }]);
      }
    }, 4000);
  }, 900);
}

// 달팽이 단계 전용 분무기 드래그
function initSnailSprayDrag(staticEl) {
  let dragging = false, ox, oy;
  const bag = document.getElementById('spray-bag');

  function getPos(e) { return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }

  function onStart(e) {
    e.preventDefault(); dragging = true;
    const p = getPos(e), sr = staticEl.getBoundingClientRect();
    ox = p.x - sr.left; oy = p.y - sr.top;
    const cr = document.getElementById('game-container').getBoundingClientRect();
    bag.style.left = (sr.left - cr.left) + 'px';
    bag.style.top  = (sr.top  - cr.top)  + 'px';
    bag.style.transition = 'none';
    bag.style.display = 'block';
    staticEl.style.opacity = '0';
  }
  function onMove(e) {
    if (!dragging) return; e.preventDefault();
    const p = getPos(e), cr = document.getElementById('game-container').getBoundingClientRect();
    bag.style.left = (p.x - cr.left - ox) + 'px';
    bag.style.top  = (p.y - cr.top  - oy) + 'px';
  }
  function onEnd() {
    if (!dragging) return; dragging = false;
    const er = bag.getBoundingClientRect();
    const cr = document.getElementById('game-container').getBoundingClientRect();
    const playW = cr.width - 270;
    const elCX = er.left + er.width / 2 - cr.left;

    if (elCX < playW) {
      // 과습 경고
      if (gameState.humidity > 97) {
        const warn = document.getElementById('warn-toomuch-water');
        if (warn) {
          warn.style.display = 'block';
          setTimeout(() => { warn.style.display = 'none'; }, 3000);
        }
        bag.style.transition = 'all 0.35s cubic-bezier(0.34,1.56,0.64,1)';
        const sr = staticEl.getBoundingClientRect();
        bag.style.left = (sr.left - cr.left) + 'px';
        bag.style.top  = (sr.top  - cr.top)  + 'px';
        setTimeout(() => { bag.style.display = 'none'; staticEl.style.opacity = '1'; }, 360);
      } else {
        applySpray(bag, staticEl, cr);
        actionCount++;
        if (typeof checkGrowth === 'function') checkGrowth();
      }
    } else {
      const sr = staticEl.getBoundingClientRect();
      bag.style.transition = 'all 0.35s cubic-bezier(0.34,1.56,0.64,1)';
      bag.style.left = (sr.left - cr.left) + 'px';
      bag.style.top  = (sr.top  - cr.top)  + 'px';
      setTimeout(() => { bag.style.display = 'none'; staticEl.style.opacity = '1'; }, 360);
    }
  }

  staticEl.addEventListener('mousedown', onStart);
  staticEl.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

// 은신처 이동
function goToHide(snail, onArrival) {
  const hideX = 64, hideY = 58;
  let x = parseFloat(snail.style.left) || 25;
  let y = parseFloat(snail.style.top)  || 60;
  const SPEED = 0.022;
  let lastTime = null;

  snail.src = IMGS.snail1;
  snail.style.width = snailSizeW + '%';
  snail.style.maxWidth = Math.round(snailSizeW * 4.5) + 'px';
  snail.style.transformOrigin = 'center center';

  function moveTick(ts) {
    if (snailDead) return;
    // 스턴 발생 시 이동 중단 (stunSnail에서 hideRoutineRunning=false로 세팅됨)
    if (!hideRoutineRunning) return;
    if (!lastTime) lastTime = ts;
    const dt = Math.min(ts - lastTime, 50);
    lastTime = ts;
    const dx = hideX - x, dy = hideY - y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 0.8) {
      snail.style.left = hideX + '%';
      snail.style.top  = hideY + '%';
      onArrival();
      return;
    }
    const step = Math.min(SPEED * dt, dist);
    x += (dx/dist)*step; y += (dy/dist)*step;
    snail.style.left = x + '%'; snail.style.top = y + '%';
    snail.style.transform = dx < 0 ? 'scaleX(1)' : 'scaleX(-1)';
    requestAnimationFrame(moveTick);
  }
  requestAnimationFrame(moveTick);
}

function enterHide(snail) {
  snailInHide = true;
  snail.style.display = 'none';
  showHideBubble(true);

  gameState.happiness = Math.min(100, gameState.happiness + 20);
  updateSnailStatsUI();

  setTimeout(() => {
    showHideBubble(false);
    snailInHide = false;
    if (snailDead) return;

    snail.style.display = 'block';
    if (gameState.happiness <= 50) {
      // 1초 나왔다가 다시 은신처
      setTimeout(() => {
        if (!snailDead && gameState.happiness <= 50) {
          hideRoutineRunning = true;
          goToHide(snail, () => enterHide(snail));
        } else {
          hideRoutineRunning = false;
          startSnailMovement();
        }
      }, 1000);
    } else {
      hideRoutineRunning = false;
      startSnailMovement();
    }
  }, 4000);
}

function startSnailMovement() {
  const snail = document.getElementById('snail-img');
  if (!snail) return;
  if (snailAnimTimer) { cancelAnimationFrame(snailAnimTimer); snailAnimTimer = null; }

  // 바닥 영역
  const GROUND = { left:6, right:72, top:52, bottom:72 };
  // 벽 영역 — top:22 (뚜껑 아래), 앞쪽 벽에 붙어서 이동
  const WALL   = { left:6, right:72, top:22, bottom:50 };
  // 코코피트 앞쪽 경계 y값 (바닥→벽 전환점)
  const COCO_EDGE_Y = 52;
  // 벽 타기 시 x 고정 범위: 앞쪽 경계에 붙어서 이동 (left~left+30 범위 앞쪽)
  const WALL_X_MIN = 8;
  const WALL_X_MAX = 65;

  const SNAIL_W = 11, SNAIL_H = 7;
  const SPEED_GROUND = 0.014;
  const SPEED_WALL   = 0.012;

  snailMode = 'ground';
  wallModeActive = false;

  let x = parseFloat(snail.style.left) || 25;
  let y = parseFloat(snail.style.top)  || 62;
  let tx = 40, ty = 63;
  let frameIdx = 0, frameTimer = 0;
  let restTimer = 0, isResting = false;
  let lastTime = null;

  // 벽 올라가기 쿨타임 (너무 자주 안 타도록)
  let wallCooldown = 0;
  const WALL_CHANCE = 0.15; // 새 목표 선택 시 15% 확률로 벽 타기

  snail.style.display = 'block';
  snail.style.width = snailSizeW + '%';
  snail.style.maxWidth = Math.round(snailSizeW * 4.5) + 'px';
  snail.style.transformOrigin = 'center center';

  function setGroundImg(idx) {
    snail.src = idx === 0 ? IMGS.snail1 : IMGS.snail2;
    snail.style.width = snailSizeW + '%';
    snail.style.maxWidth = Math.round(snailSizeW * 4.5) + 'px';
    const br = idx === 1 ? 'brightness(1.05)' : 'brightness(1)';
    snail.style.filter = `drop-shadow(0 2px 4px rgba(0,0,0,0.15)) ${br}`;
    snail.style.transformOrigin = 'center center';
  }

  function pickGroundTarget() {
    // 먹이가 있으면 높은 확률로 먹이 위(덮도록)로 이동
    if (foodOnStage && Math.random() < 0.65) {
      tx = 10 + Math.random() * 28;   // 먹이 위치 left:8~50% 중앙부
      ty = 53 + Math.random() * 10;   // 먹이 위쪽
    } else {
      tx = GROUND.left + Math.random() * (GROUND.right  - GROUND.left  - SNAIL_W);
      ty = GROUND.top  + Math.random() * (GROUND.bottom - GROUND.top   - SNAIL_H);
    }
    isResting = Math.random() < 0.25;
    restTimer = isResting ? (2000 + Math.random() * 3000) : 0;
  }
  function pickWallTarget() {
    tx = WALL_X_MIN + Math.random() * (WALL_X_MAX - WALL_X_MIN);
    ty = WALL.top  + Math.random() * (WALL.bottom - WALL.top);
  }
  pickGroundTarget();

  // 벽 타기 시퀀스
  function startWallSequence() {
    if (snailStunned || snailDead || hideRoutineRunning) return;
    wallModeActive = true;
    snailMode = 'raising_approach';
    // 앞쪽 경계: x는 현재 위치 유지, y만 코코피트 앞쪽 경계로
    tx = Math.max(WALL_X_MIN, Math.min(WALL_X_MAX, x));
    ty = COCO_EDGE_Y;
  }

  function tick(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(ts - lastTime, 50);
    lastTime = ts;

    if (snailDead) return;

    // 스턴 중엔 RAF 중단 (stunSnail 해제 시 startSnailMovement 재호출)
    if (snailStunned) return;

    // 행복도 50% 이하 → 은신처
    if (gameState.happiness <= 50 && !snailInHide && !hideRoutineRunning) {
      hideRoutineRunning = true;
      wallModeActive = false;
      snailMode = 'ground';
      if (snailAnimTimer) { cancelAnimationFrame(snailAnimTimer); snailAnimTimer = null; }
      goToHide(snail, () => enterHide(snail));
      return;
    }

    // ===== 바닥 모드 =====
    if (snailMode === 'ground') {
      wallCooldown = Math.max(0, wallCooldown - dt);

      if (isResting) {
        restTimer -= dt;
        if (restTimer <= 0) { isResting = false; pickGroundTarget(); }
        snailAnimTimer = requestAnimationFrame(tick);
        return;
      }

      const dx = tx - x, dy = ty - y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.5) {
        // 목표 도달 → 벽 타기 여부 판정
        if (wallCooldown <= 0 && Math.random() < WALL_CHANCE) {
          wallCooldown = 30000; // 30초 쿨타임
          startWallSequence();
        } else {
          pickGroundTarget();
        }
      } else {
        const step = Math.min(SPEED_GROUND * dt, dist);
        x += (dx/dist)*step; y += (dy/dist)*step;
        snail.style.left = x + '%'; snail.style.top = y + '%';
        snail.style.transform = dx < 0 ? 'scaleX(1)' : 'scaleX(-1)';
        frameTimer += dt;
        if (frameTimer > 600) {
          frameTimer = 0; frameIdx = 1 - frameIdx;
          setGroundImg(frameIdx);
        }
        // 똥 경로 기록 - 현재 실제 위치와 방향으로
        if (poopActive) {
          const facingLeftNow = snail.style.transform === 'scaleX(1)';
          recordPoopPoint(x, y, facingLeftNow);
          tickPoop(dt);
        }
      }

    // ===== 경계선 접근 (벽 타기 준비) =====
    } else if (snailMode === 'raising_approach') {
      const dx = tx - x, dy = ty - y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 0.8) {
        // 경계 도달 → 고개드는 이미지로 전환
        snailMode = 'raising';
        snail.src = IMGS.snailRaise;
        snail.style.width = (snailSizeW*1.23).toFixed(1) + '%';
        snail.style.maxWidth = Math.round(snailSizeW*1.23*4.5) + 'px';
        snail.style.transform = 'scaleX(1)';
        snail.style.filter = 'drop-shadow(0 2px 4px rgba(0,0,0,0.15))';
        // 0.8초 후 벽 이동 시작
        setTimeout(() => {
          if (!snailDead && !snailStunned && wallModeActive) {
            snailMode = 'wall';
            snail.src = IMGS.wallSnail1;
            snail.style.width = (snailSizeW*1.23).toFixed(1) + '%';
            snail.style.maxWidth = Math.round(snailSizeW*1.23*4.5) + 'px';
            snail.style.transform = 'rotate(0deg)';
            pickWallTarget();
          } else {
            snailMode = 'ground';
            wallModeActive = false;
            setGroundImg(0);
            pickGroundTarget();
          }
        }, 800);
      } else {
        const step = Math.min(SPEED_GROUND * dt, dist);
        x += (dx/dist)*step; y += (dy/dist)*step;
        snail.style.left = x + '%'; snail.style.top = y + '%';
        snail.style.transform = dx < 0 ? 'scaleX(1)' : 'scaleX(-1)';
      }

    // ===== 벽 이동 =====
    } else if (snailMode === 'wall') {
      if (isResting) {
        restTimer -= dt;
        if (restTimer <= 0) { isResting = false; }
        snailAnimTimer = requestAnimationFrame(tick);
        return;
      }

      const dx = tx - x, dy = ty - y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 0.8) {
        // 벽 목표 도달 → 내려오거나 계속 벽 이동
        if (Math.random() < 0.4 || y < WALL.top + 5) {
          // 내려오기 시작
          snailMode = 'descending';
          ty = COCO_EDGE_Y + 5;
          tx = x;
        } else {
          pickWallTarget();
          // 가끔 쉬기
          if (Math.random() < 0.2) { isResting = true; restTimer = 1000 + Math.random()*2000; }
        }
      } else {
        const step = Math.min(SPEED_WALL * dt, dist);
        x += (dx/dist)*step; y += (dy/dist)*step;
        snail.style.left = x + '%'; snail.style.top = y + '%';

        // 방향에 따라 이미지 회전
        // 각도 계산
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        // 내려가는 중(dy > 0)이면 머리가 아래를 향하도록 180도 회전
        if (dy > 5) {
          snail.style.transform = `rotate(${angle + 90}deg)`;
        } else {
          snail.style.transform = `rotate(${angle - 90}deg)`;
        }

        frameTimer += dt;
        if (frameTimer > 600) {
          frameTimer = 0; frameIdx = 1 - frameIdx;
          snail.src = frameIdx === 0 ? IMGS.wallSnail1 : IMGS.wallSnail2;
        }
      }

    // ===== 내려오기 =====
    } else if (snailMode === 'descending') {
      const dx = tx - x, dy = ty - y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      // 내려오는 중: 머리가 아래를 향하도록 180도
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      snail.style.transform = `rotate(${angle + 90}deg)`;

      frameTimer += dt;
      if (frameTimer > 600) {
        frameTimer = 0; frameIdx = 1 - frameIdx;
        snail.src = frameIdx === 0 ? IMGS.wallSnail1 : IMGS.wallSnail2;
      }

      if (dist < 0.8) {
        // 바닥 도착 → ground 복귀
        snailMode = 'ground';
        wallModeActive = false;
        frameIdx = 0;
        setGroundImg(0);
        snail.style.transform = 'scaleX(1)';
        snail.style.width = snailSizeW + '%';
        snail.style.maxWidth = Math.round(snailSizeW * 4.5) + 'px';
        pickGroundTarget();
      } else {
        const step = Math.min(SPEED_WALL * dt, dist);
        x += (dx/dist)*step; y += (dy/dist)*step;
        snail.style.left = x + '%'; snail.style.top = y + '%';
      }
    }

    snailAnimTimer = requestAnimationFrame(tick);
  }

  snailAnimTimer = requestAnimationFrame(tick);
}

function showCompletionPanel() {
  if (humidityTimer) { clearInterval(humidityTimer); humidityTimer = null; }
  setSidePanel(`
    <div style="text-align:center; padding: 10px 0;">
      <div style="font-size:46px; margin-bottom:8px; animation:snailBounce 2s ease-in-out infinite">🐌</div>
      <div style="font-family:'Jua',sans-serif; font-size:18px; color:#1b5e20; margin-bottom:8px">사육 환경 완성! 🎉</div>
      <div style="font-size:12px; color:#555; line-height:1.8">
        달팽이를 맞이할 준비가 되었어요!<br>다음 단계에서 달팽이 친구를 만나봐요 🌿
      </div>
      <button class="next-btn" style="margin-top:14px" onclick="alert('다음 단계는 곧 업데이트됩니다! 🐌')">달팽이 데려오기 →</button>
    </div>
  `);
  setProgress(STEPS.length);
}

// ===== 분무기 단계 =====
function showSprayStep() {
  gameState.humidity = 0;
  setSidePanel(`
    <div class="step-badge">💧 습도 관리</div>

    <!-- 습도 게이지 (항상 패널 상단에 표시) -->
    <div style="margin-bottom:12px;">
      <div style="display:flex; align-items:center; margin-bottom:4px;">
        <span style="font-family:'Jua',sans-serif; font-size:12px; color:#1565c0;">💧 습도</span>
      </div>
      <div style="background:#e3f2fd; border-radius:20px; height:14px; overflow:hidden; border:1px solid #bbdefb;">
        <div id="humidity-bar"
          style="height:100%; width:0%; border-radius:20px;
                 background:linear-gradient(90deg,#4fc3f7,#0288d1);
                 transition:width 0.4s ease;"></div>
      </div>
      <div id="humidity-warning" style="display:none; margin-top:5px;
        background:#fff3e0; border-left:3px solid #ff9800; border-radius:0 8px 8px 0;
        padding:5px 8px; font-size:11px; color:#e65100; line-height:1.4;">
        ⚠️ 공기가 너무 건조해요!<br>분무기를 뿌려주세요.
      </div>
    </div>

    <div class="info-box">
      달팽이는 습한 환경을 좋아해요.<br>
      분무기를 뿌려 촉촉하게 해주세요.
    </div>
    <div class="panel-title">분무기를 사육상자로<br>드래그해봐요! 💦</div>
    <img id="spray-static" src="images/분무기.png" alt="분무기" draggable="false"
      style="width:72px;height:auto;cursor:grab;display:block;margin:8px auto 4px;
             filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2));user-select:none;touch-action:none;">
    <div style="font-size:11px;color:#888;text-align:center;">← 잡아서 왼쪽으로 드래그!</div>
    <button class="next-btn" id="spray-done-btn" onclick="finishSpray()" disabled
      style="margin-top:12px;">환경 설정 완료! ✓</button>
  `);

  requestAnimationFrame(() => {
    const staticEl = document.getElementById('spray-static');
    if (staticEl) initSprayDrag(staticEl);
    startHumidityDrain();
  });
}

function initSprayDrag(staticEl) {
  let dragging = false, ox, oy;
  const bag = document.getElementById('spray-bag');

  function getPos(e) { return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }

  function onStart(e) {
    e.preventDefault(); dragging = true;
    const p = getPos(e), sr = staticEl.getBoundingClientRect();
    ox = p.x - sr.left; oy = p.y - sr.top;
    const cr = document.getElementById('game-container').getBoundingClientRect();
    bag.style.left = (sr.left - cr.left) + 'px';
    bag.style.top  = (sr.top  - cr.top)  + 'px';
    bag.style.transition = 'none';
    bag.style.display = 'block';
    staticEl.style.opacity = '0';
  }
  function onMove(e) {
    if (!dragging) return; e.preventDefault();
    const p = getPos(e), cr = document.getElementById('game-container').getBoundingClientRect();
    bag.style.left = (p.x - cr.left - ox) + 'px';
    bag.style.top  = (p.y - cr.top  - oy) + 'px';
  }
  function onEnd() {
    if (!dragging) return; dragging = false;
    const er = bag.getBoundingClientRect();
    const cr = document.getElementById('game-container').getBoundingClientRect();
    const playW = cr.width - 270;
    const elCX = er.left + er.width  / 2 - cr.left;
    const elCY = er.top  + er.height / 2 - cr.top;

    if (elCX < playW) {
      applySpray(bag, staticEl, cr);
    } else {
      // 원위치 복귀
      const sr = staticEl.getBoundingClientRect();
      bag.style.transition = 'all 0.35s cubic-bezier(0.34,1.56,0.64,1)';
      bag.style.left = (sr.left - cr.left) + 'px';
      bag.style.top  = (sr.top  - cr.top)  + 'px';
      setTimeout(() => { bag.style.display = 'none'; staticEl.style.opacity = '1'; }, 360);
    }
  }

  staticEl.addEventListener('mousedown', onStart);
  staticEl.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

function applySpray(bag, staticEl, cr) {
  // 분무기 분사 위치 (사육상자 위)
  const dropX = bag.getBoundingClientRect().left - cr.left + 35;
  const dropY = bag.getBoundingClientRect().top  - cr.top  + 10;

  // 물방울 애니메이션
  sprayWaterDrops(dropX, dropY);

  // 분무기 진동 애니메이션 후 복귀
  bag.style.animation = 'sprayShake 0.4s ease';
  setTimeout(() => {
    bag.style.animation = '';
    bag.style.transition = 'all 0.35s cubic-bezier(0.34,1.56,0.64,1)';
    const sr = staticEl ? staticEl.getBoundingClientRect() : null;
    if (sr) {
      bag.style.left = (sr.left - cr.left) + 'px';
      bag.style.top  = (sr.top  - cr.top)  + 'px';
    }
    setTimeout(() => {
      bag.style.display = 'none';
      if (staticEl) staticEl.style.opacity = '1';
    }, 360);
  }, 600);

  // 습도 증가
  gameState.humidity = Math.min(HUMIDITY_MAX, gameState.humidity + HUMIDITY_PER_SPRAY);
  updateHumidityUI();

  // 한 번이라도 뿌렸으면 완료 버튼 활성화
  const doneBtn = document.getElementById('spray-done-btn');
  if (doneBtn) doneBtn.disabled = false;
}

function sprayWaterDrops(x, y) {
  const container = document.getElementById('game-container');
  const count = 18;
  for (let i = 0; i < count; i++) {
    const drop = document.createElement('div');
    const angle = (Math.random() * 70) + 200; // 왼쪽 하단 방향으로 퍼짐
    const dist  = 30 + Math.random() * 60;
    const size  = 3 + Math.random() * 5;
    const rad   = angle * Math.PI / 180;
    const tx    = Math.cos(rad) * dist;
    const ty    = Math.sin(rad) * dist;
    const delay = Math.random() * 120;

    drop.style.cssText = `
      position:absolute;
      left:${x}px; top:${y}px;
      width:${size}px; height:${size}px;
      background: radial-gradient(circle, #a8d8ea, #60b8d4);
      border-radius:50%;
      pointer-events:none;
      z-index:60;
      opacity:0.9;
      animation: dropFly 0.7s ease-out ${delay}ms forwards;
      --tx:${tx}px; --ty:${ty}px;
    `;
    container.appendChild(drop);
    setTimeout(() => drop.remove(), 900 + delay);
  }
}

function startHumidityDrain() {
  if (humidityTimer) clearInterval(humidityTimer);
  humidityTimer = setInterval(() => {
    if (STEPS[gameState.step] !== 'spray') {
      clearInterval(humidityTimer); humidityTimer = null; return;
    }
    gameState.humidity = Math.max(0, gameState.humidity - HUMIDITY_DRAIN);
    updateHumidityUI();
  }, 1000);
}

// 달팽이 단계: 습도+배고픔+행복 통합 감소
function startStatDrain() {
  if (statDrainTimer) clearInterval(statDrainTimer);
  dryTimer = 0;
  let hungerTimer = 0;
  statDrainTimer = setInterval(() => {
    if (snailDead) return;
    gameState.humidity   = Math.max(0, gameState.humidity   - HUMIDITY_DRAIN);
    gameState.hunger     = Math.max(0, gameState.hunger     - HUNGER_DRAIN);
    gameState.happiness  = Math.max(0, gameState.happiness  - HAPPINESS_DRAIN);
    updateSnailStatsUI();
    checkSnailWarnings();

    // 건조 연속 20초 사망
    if (gameState.humidity <= 10) {
      dryTimer++;
      if (dryTimer >= 20) { killSnail('dry'); return; }
    } else {
      dryTimer = 0;
    }

    // 배고픔 연속 20초 사망
    if (gameState.hunger <= 10) {
      hungerTimer++;
      if (hungerTimer >= 20) { killSnail('hunger'); return; }
    } else {
      hungerTimer = 0;
    }
  }, 1000);
}

function stopStatDrain() {
  if (statDrainTimer) { clearInterval(statDrainTimer); statDrainTimer = null; }
}

function updateSnailStatsUI() {
  const hBar = document.getElementById('snail-humidity-bar');
  const fBar = document.getElementById('snail-hunger-bar');
  const hpBar= document.getElementById('snail-happiness-bar');
  if (!hBar) return;

  const h  = Math.round(gameState.humidity);
  const f  = Math.round(gameState.hunger);
  const hp = Math.round(gameState.happiness);

  hBar.style.width  = h  + '%';
  fBar.style.width  = f  + '%';
  hpBar.style.width = hp + '%';

  // 색상 변화
  hBar.style.background  = h  < 30 ? 'linear-gradient(90deg,#ffb74d,#ff9800)' : 'linear-gradient(90deg,#4fc3f7,#0288d1)';
  fBar.style.background  = f  < 50 ? 'linear-gradient(90deg,#ef9a9a,#e53935)' : 'linear-gradient(90deg,#a5d6a7,#43a047)';
  hpBar.style.background = hp < 30 ? 'linear-gradient(90deg,#ce93d8,#8e24aa)' : 'linear-gradient(90deg,#f48fb1,#e91e63)';
}

function checkSnailWarnings() {
  if (snailDead) return;
  const h  = gameState.humidity;
  const f  = gameState.hunger;
  const hp = gameState.happiness;

  const wHumidity   = document.getElementById('warn-humidity');
  const wHunger     = document.getElementById('warn-hunger');
  const wHappiness  = document.getElementById('warn-happiness');

  if (wHumidity)  wHumidity.style.display  = (h  < 30) ? 'block' : 'none';
  if (wHunger)    wHunger.style.display    = (f  < 50) ? 'block' : 'none';

  if (hp < 30) {
    if (!lifeWarningShown) {
      lifeWarningShown = true;
      lifeWarningCount++;
      if (wHappiness) wHappiness.style.display = 'block';
      if (lifeWarningCount >= 2) {
        // 2번째 경고 → 3초 후 사망
        setTimeout(() => killSnail('happiness'), 3000);
      }
    }
  } else {
    lifeWarningShown = false;
    if (wHappiness) wHappiness.style.display = 'none';
  }
}

function updateHumidityUI() {
  const bar     = document.getElementById('humidity-bar');
  const warning = document.getElementById('humidity-warning');
  if (!bar) return;
  const h = Math.round(gameState.humidity);
  bar.style.width = h + '%';
  bar.style.background = h < 30 ? 'linear-gradient(90deg,#ffb74d,#ff9800)' : 'linear-gradient(90deg,#4fc3f7,#0288d1)';
  if (warning) warning.style.display = (h < 30 && h > 0) ? 'block' : 'none';
}

function finishSpray() {
  showToast('💧 촉촉하게 완료!', '#e3f2fd', '#0277bd');
  setTimeout(() => {
    hideToast();
    gameState.step++;
    renderStep();
  }, 1200);
}

// ===== 유틸 =====
function setSidePanel(html) {
  document.getElementById('side-panel').innerHTML = html;
}

function showToast(text, bg, color) {
  const t = document.getElementById('feedback-toast');
  t.style.cssText = `background:${bg}; color:${color}; display:block;`;
  t.innerHTML = text;
}
function hideToast() {
  document.getElementById('feedback-toast').style.display = 'none';
}
</script>

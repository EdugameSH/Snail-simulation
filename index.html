<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>뱅글뱅글 달팽이 키우기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Gowun Dodum', sans-serif;
  background: #c8e6c9;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ===== 전체 게임 컨테이너 (가로형) ===== */
#game-container {
  position: relative;
  /* 가로형: 화면에 꽉 차게, 최대 900×560 */
  width: min(900px, 100vw);
  height: min(560px, 100vh);
  background: linear-gradient(160deg, #87ceeb 0%, #b8dff5 40%, #c8e6c9 70%, #a5d6a7 100%);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}

/* 장식 */
.deco-leaf {
  position: absolute; font-size:20px; opacity:0.3;
  pointer-events:none; z-index:1;
  animation: floatLeaf 6s ease-in-out infinite;
}
@keyframes floatLeaf {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-10px) rotate(8deg); }
}

/* ===== 타이틀 ===== */
#title-screen {
  position: absolute; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: linear-gradient(160deg, #e8f5e9, #f1f8e9, #dcedc8);
  border-radius: 20px;
}
.title-snail {
  font-size: 72px;
  animation: snailBounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}
@keyframes snailBounce {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-12px) rotate(5deg); }
}
.game-title {
  font-family: 'Jua', sans-serif;
  font-size: clamp(24px, 4vw, 34px);
  color: #2e7d32; text-align: center; line-height: 1.3;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
}
.game-subtitle { font-size:13px; color:#558b2f; opacity:0.85; }
.start-btn {
  margin-top: 10px;
  background: #4caf50; color: white; border: none;
  padding: 14px 44px; border-radius: 50px;
  font-family: 'Jua', sans-serif; font-size: 20px;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 5px 0 #388e3c, 0 7px 14px rgba(0,0,0,0.2);
  transition: all 0.1s;
}
.start-btn:hover  { transform: translateY(2px); box-shadow: 0 3px 0 #388e3c; }
.start-btn:active { transform: translateY(5px); box-shadow: none; }

/* ===== 게임 화면 ===== */
#game-screen {
  position: absolute; inset: 0;
  display: none;
}

/* 진행 바 */
#progress-bar {
  position: absolute; top:0; left:0; right:0; height:4px;
  background: rgba(255,255,255,0.35); z-index:30;
}
#progress-fill {
  height:100%;
  background: linear-gradient(90deg, #4caf50, #8bc34a);
  transition: width 0.6s ease;
}

/* ===== 가로 분할 레이아웃 ===== */
/* 왼쪽: 플레이박스 (사육상자 영역) */
#play-area {
  position: absolute;
  top: 4px; bottom: 0; left: 0;
  /* 오른쪽 패널 너비(270px) 제외 */
  right: 270px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 12px 12px;
}

/* 사육상자 래퍼 — play-area 안에서 최대한 크게 */
#terrarium-wrap {
  position: relative;
  width: 100%;
  max-width: 520px;
  display: none;
}
#terrarium-img {
  width: 100%; height: auto; display: block;
  transition: opacity 0.4s;
}

/* 은신처 */
#hide-item {
  position: absolute;
  bottom: 20%; left: 70%;
  transform: translateX(-50%);
  width: 18%; max-width: 80px; height: auto;
  display: none;
  animation: itemAppear 0.5s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 6;
}
@keyframes itemAppear {
  from { transform: translateX(-50%) scale(0) rotate(-15deg); opacity:0; }
  to   { transform: translateX(-50%) scale(1) rotate(0deg);   opacity:1; }
}

/* 코코피트 봉투 */
#coco-bag {
  position: absolute;
  width: 70px;
  cursor: grab;
  z-index: 25;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
  user-select: none; display: none;
  touch-action: none;
}
#coco-bag:active { cursor: grabbing; }

#drop-hint {
  position: absolute;
  font-size: 11px; color: #5d4037;
  background: rgba(255,255,255,0.92);
  padding: 3px 8px; border-radius: 20px;
  pointer-events: none; display: none;
  z-index: 26; white-space: nowrap;
  font-family: 'Jua', sans-serif;
}

/* ===== 오른쪽 패널 ===== */
#side-panel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 270px;
  background: rgba(255,255,255,0.96);
  border-radius: 0 20px 20px 0;
  box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  padding: 20px 16px 16px;
  overflow-y: auto;
  z-index: 20;
  display: flex;
  flex-direction: column;
}

.step-badge {
  display: inline-block;
  background: #4caf50; color: white;
  font-family: 'Jua', sans-serif; font-size: 11px;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
}
.panel-title {
  font-family: 'Jua', sans-serif; font-size: 15px;
  color: #1b5e20; margin-bottom: 6px; line-height: 1.4;
}
.panel-desc {
  font-size: 11px; color: #777;
  margin-bottom: 10px; line-height: 1.5;
}
.info-box {
  background: #e8f5e9;
  border-left: 4px solid #4caf50;
  border-radius: 0 10px 10px 0;
  padding: 9px 11px;
  font-size: 12px; color: #2e7d32;
  margin-bottom: 12px; line-height: 1.6;
}

/* 사육상자 선택 */
.box-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 7px;
}
.box-option {
  background: white; border: 2px solid #e0e0e0;
  border-radius: 12px; padding: 7px 4px;
  cursor: pointer; text-align: center; transition: all 0.2s;
}
.box-option:hover { border-color:#4caf50; transform:translateY(-3px); box-shadow:0 5px 12px rgba(76,175,80,0.2); }
.box-option.selected { border-color:#4caf50; background:#f1f8e9; }
.box-option img { width:100%; height:52px; object-fit:contain; }
.box-option span { display:block; font-size:10px; color:#555; margin-top:2px; }

/* 은신처 선택 */
.hide-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 7px;
}
.hide-option {
  background: white; border: 2px solid #e0e0e0;
  border-radius: 12px; padding: 7px 4px;
  cursor: pointer; text-align: center; transition: all 0.2s;
}
.hide-option:hover { border-color:#4caf50; transform:translateY(-3px); box-shadow:0 5px 12px rgba(76,175,80,0.2); }
.hide-option.selected { border-color:#4caf50; background:#f1f8e9; }
.hide-option img { width:100%; height:52px; object-fit:contain; }
.hide-option span { display:block; font-size:10px; color:#555; margin-top:2px; }

/* 버튼 */
.next-btn {
  display:block; width:100%; margin-top:10px;
  background:#4caf50; color:white; border:none;
  padding:11px; border-radius:10px;
  font-family:'Jua',sans-serif; font-size:15px;
  cursor:pointer; box-shadow:0 3px 0 #388e3c;
  transition:all 0.1s;
}
.next-btn:hover  { transform:translateY(2px); box-shadow:0 1px 0 #388e3c; }
.next-btn:active { transform:translateY(3px); box-shadow:none; }
.next-btn:disabled { background:#bdbdbd; box-shadow:0 3px 0 #9e9e9e; cursor:not-allowed; transform:none; }

/* ===== 퀴즈 팝업 (플레이박스 위) ===== */
#quiz-popup {
  position: absolute;
  /* play-area 안에서 중앙 */
  top: 50%; left: calc(50% - 135px); /* play-area 중앙, right:270px 고려 */
  transform: translate(-50%, -50%);
  width: min(360px, calc(100vw - 290px));
  background: rgba(255,255,255,0.97);
  border-radius: 20px;
  padding: 22px 20px 18px;
  box-shadow: 0 8px 36px rgba(0,0,0,0.18);
  z-index: 40;
  display: none;
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform: translate(-50%,-50%) scale(0.5); opacity:0; }
  to   { transform: translate(-50%,-50%) scale(1);   opacity:1; }
}
.quiz-badge {
  display:inline-block; background:#ff8f00; color:white;
  font-family:'Jua',sans-serif; font-size:11px;
  padding:3px 10px; border-radius:20px; margin-bottom:8px;
}
.quiz-title {
  font-family:'Jua',sans-serif; font-size:15px;
  color:#1b5e20; margin-bottom:10px; line-height:1.4;
}
.choices { display:flex; flex-direction:column; gap:6px; }
.choice-btn {
  background:#f1f8e9; border:2px solid #c5e1a5;
  border-radius:10px; padding:9px 12px;
  font-family:'Gowun Dodum',sans-serif; font-size:12px;
  color:#33691e; cursor:pointer; text-align:left;
  transition:all 0.2s; line-height:1.4;
}
.choice-btn:hover  { background:#dcedc8; border-color:#8bc34a; transform:translateX(3px); }
.choice-btn.correct { background:#e8f5e9; border-color:#4caf50; color:#1b5e20; animation:correctFlash 0.5s; }
.choice-btn.wrong   { background:#ffebee; border-color:#ef5350; color:#c62828; animation:shake 0.4s; }

@keyframes correctFlash {
  0%,100% { background:#e8f5e9; }
  50%      { background:#a5d6a7; }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25%      { transform:translateX(-5px); }
  75%      { transform:translateX(5px); }
}

/* 피드백 토스트 (플레이박스 상단) */
#feedback-toast {
  position: absolute;
  top: 14%; left: calc(50% - 135px);
  transform: translateX(-50%);
  background: white; border-radius: 30px;
  padding: 10px 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 50; font-family: 'Jua', sans-serif; font-size: 16px;
  display: none; white-space: nowrap;
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes toastIn {
  from { transform: translateX(-50%) translateY(-10px); opacity:0; }
  to   { transform: translateX(-50%) translateY(0);     opacity:1; }
}
</style>
</head>
<body>
<div id="game-container">

  <span class="deco-leaf" style="top:6%;left:4%;animation-delay:0s">🍃</span>
  <span class="deco-leaf" style="top:10%;left:30%;animation-delay:2s">🌿</span>
  <span class="deco-leaf" style="top:4%;left:55%;animation-delay:4s">☘️</span>

  <!-- 타이틀 -->
  <div id="title-screen">
    <div class="title-snail">🐌</div>
    <div class="game-title">뱅글뱅글 달팽이 키우기</div>
    <div class="game-subtitle">나만의 달팽이 친구를 만들어봐요!</div>
    <button class="start-btn" onclick="startGame()">시작하기 🌿</button>
  </div>

  <!-- 게임 화면 -->
  <div id="game-screen">
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

    <!-- 왼쪽: 플레이박스 -->
    <div id="play-area">
      <div id="terrarium-wrap">
        <img id="terrarium-img" src="" alt="사육상자">
        <img id="hide-item" src="" alt="은신처">
      </div>
    </div>

    <!-- 코코피트 봉투 -->
    <img id="coco-bag" src="images/코코피트봉투.png" alt="코코피트" draggable="false">
    <div id="drop-hint">📦 사육상자로 드래그!</div>

    <!-- 퀴즈 팝업 -->
    <div id="quiz-popup"></div>

    <!-- 피드백 토스트 -->
    <div id="feedback-toast"></div>

    <!-- 오른쪽: 사이드 패널 -->
    <div id="side-panel"></div>
  </div>

</div>
<script>
const IMGS = {
  box_green:    'images/사육상자초록.png',
  box_yellow:   'images/사육상자노랑.png',
  box_blue:     'images/사육상자파랑.png',
  coco_green:   'images/코코피트사육상자초록.png',
  coco_yellow:  'images/코코피트사육상자노랑.png',
  coco_blue:    'images/코코피트사육상자파랑.png',
  hide_mushroom:'images/버섯은신처.png',
  hide_pumpkin: 'images/호박은신처.png',
  hide_coconut: 'images/코코넛은신처.png',
};

let gameState = { step:0, selectedBox:null, selectedHide:null };
const STEPS = ['quiz1','boxSelect','quiz2','cocopeat','hideSelect'];

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  renderStep();
}

function setProgress(n) {
  document.getElementById('progress-fill').style.width = (n / STEPS.length * 100) + '%';
}

function renderStep() {
  const step = STEPS[gameState.step];
  setProgress(gameState.step);
  document.getElementById('quiz-popup').style.display = 'none';

  if (step === 'quiz1') {
    setSidePanel('');  // 패널 비움
    showQuizPopup(
      '퀴즈 1',
      '달팽이는 어디서 키워야 할까요? 🐌',
      [
        { text: '① 자유롭게 움직일 수 있는 방바닥', correct: false },
        { text: '② 달팽이가 탈출하지 못하도록 뚜껑이 달린 사육상자', correct: true },
        { text: '③ 달팽이와 손쉽게 교감할 수 있는 넓은 쟁반', correct: false },
      ]
    );

  } else if (step === 'boxSelect') {
    setSidePanel(`
      <div class="step-badge">🏠 사육상자 선택</div>
      <div class="info-box">달팽이가 밖으로 나오지 않도록 뚜껑이 있는 사육상자를 준비합니다.</div>
      <div class="panel-title">어떤 사육상자를 선택할까요?</div>
      <div class="box-grid">
        <div class="box-option" onclick="selectBox('green',this)">
          <img src="${IMGS.box_green}" alt="초록">
          <span>🟢 초록</span>
        </div>
        <div class="box-option" onclick="selectBox('yellow',this)">
          <img src="${IMGS.box_yellow}" alt="노랑">
          <span>🟡 노랑</span>
        </div>
        <div class="box-option" onclick="selectBox('blue',this)">
          <img src="${IMGS.box_blue}" alt="파랑">
          <span>🔵 파랑</span>
        </div>
      </div>
      <button class="next-btn" id="box-next-btn" onclick="confirmBox()" disabled>선택 완료 ✓</button>
    `);

  } else if (step === 'quiz2') {
    showQuizPopup(
      '퀴즈 2',
      '달팽이는 어떤 환경을 좋아할까요? 🌿',
      [
        { text: '① 햇빛이 쨍쨍하고 따뜻하며 건조한 환경', correct: false },
        { text: '② 그늘지고 따뜻하며 습한 환경', correct: true },
        { text: '③ 그늘지고 시원하며 습한 환경', correct: false },
      ]
    );

  } else if (step === 'cocopeat') {
    showCocopeatStep();

  } else if (step === 'hideSelect') {
    showHideSelect();
  }
}

// ===== 퀴즈 팝업 =====
function showQuizPopup(badge, question, options) {
  const popup = document.getElementById('quiz-popup');
  const choicesHtml = options.map((o, i) =>
    `<button class="choice-btn" onclick="answerQuiz(this,${o.correct})">${o.text}</button>`
  ).join('');
  popup.innerHTML = `
    <div class="quiz-badge">📚 ${badge}</div>
    <div class="quiz-title">${question}</div>
    <div class="choices">${choicesHtml}</div>
  `;
  popup.style.display = 'block';
}

function answerQuiz(btn, isCorrect) {
  btn.closest('.choices').querySelectorAll('.choice-btn')
     .forEach(b => b.style.pointerEvents = 'none');
  if (isCorrect) {
    btn.classList.add('correct');
    btn.innerHTML = '✅ ' + btn.textContent + ' 정답!';
    showToast('🎉 정답이에요!', '#e8f5e9', '#2e7d32');
    setTimeout(() => {
      hideToast();
      document.getElementById('quiz-popup').style.display = 'none';
      gameState.step++;
      renderStep();
    }, 1400);
  } else {
    btn.classList.add('wrong');
    showToast('❌ 다시 생각해봐요!', '#ffebee', '#c62828');
    setTimeout(() => {
      hideToast();
      btn.classList.remove('wrong');
      btn.closest('.choices').querySelectorAll('.choice-btn')
         .forEach(b => b.style.pointerEvents = '');
    }, 900);
  }
}

// ===== 사육상자 선택 =====
function selectBox(color, el) {
  document.querySelectorAll('.box-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  gameState.selectedBox = color;
  document.getElementById('box-next-btn').disabled = false;
}

function confirmBox() {
  if (!gameState.selectedBox) return;
  const wrap = document.getElementById('terrarium-wrap');
  const img  = document.getElementById('terrarium-img');
  img.src = IMGS['box_' + gameState.selectedBox];
  img.style.opacity = '0';
  wrap.style.display = 'block';
  requestAnimationFrame(() => requestAnimationFrame(() => { img.style.opacity = '1'; }));
  gameState.step++;
  renderStep();
}

// ===== 코코피트 =====
function showCocopeatStep() {
  setSidePanel(`
    <div class="step-badge">🌱 바닥재 준비</div>
    <div class="info-box">
      코코피트를 깔아줍시다.<br>
      코코피트는 달팽이가 속으로 파고들 수 있도록 충분한 높이로 깔아주어야 합니다.
    </div>
    <div class="panel-title">코코피트 봉투를 사육상자로<br>드래그해봐요! 👆</div>
    <div class="panel-desc">봉투를 잡아서 왼쪽 사육상자에 가져다 놓으세요</div>
  `);

  // 봉투 초기 위치: 사육상자 오른쪽 하단 안쪽 (동그라미 위치)
  // play-area 기준: play-area 우측 끝 근처, 사육상자 하단부
  requestAnimationFrame(() => {
    const gc       = document.getElementById('game-container').getBoundingClientRect();
    const sideW    = 270;
    const playW    = gc.width - sideW;
    const bag      = document.getElementById('coco-bag');
    const hint     = document.getElementById('drop-hint');

    // 사육상자 오른쪽 아래 — play-area 우측 끝에서 약간 안쪽, 세로 중하단
    bag.style.left  = (playW * 0.72) + 'px';
    bag.style.top   = (gc.height * 0.52) + 'px';
    bag.style.display = 'block';

    hint.style.left  = (playW * 0.56) + 'px';
    hint.style.top   = (gc.height * 0.44) + 'px';
    hint.style.display = 'block';

    makeDraggable(bag);
  });
}

function makeDraggable(el) {
  let dragging = false, ox, oy;
  function getPos(e) { return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }

  function onStart(e) {
    e.preventDefault(); dragging = true;
    const p = getPos(e), r = el.getBoundingClientRect();
    ox = p.x - r.left; oy = p.y - r.top;
    el.style.transition = 'none'; el.style.zIndex = 40;
    document.getElementById('drop-hint').style.display = 'none';
  }
  function onMove(e) {
    if (!dragging) return; e.preventDefault();
    const p = getPos(e), cr = document.getElementById('game-container').getBoundingClientRect();
    el.style.left = (p.x - cr.left - ox) + 'px';
    el.style.top  = (p.y - cr.top  - oy) + 'px';
  }
  function onEnd() {
    if (!dragging) return; dragging = false;
    const er = el.getBoundingClientRect();
    const cr = document.getElementById('game-container').getBoundingClientRect();
    const sideW = 270;
    const playW = cr.width - sideW;
    const elCX  = er.left + er.width  / 2 - cr.left;
    const elCY  = er.top  + er.height / 2 - cr.top;
    // 플레이박스(왼쪽 영역) 안에 드롭됐으면 성공
    if (elCX < playW && elCY > 0 && elCY < cr.height) {
      applyCocoPeat();
    } else {
      // 원위치
      el.style.transition = 'all 0.4s cubic-bezier(0.34,1.56,0.64,1)';
      const gc = cr;
      el.style.left = (playW * 0.72) + 'px';
      el.style.top  = (gc.height * 0.52) + 'px';
      document.getElementById('drop-hint').style.display = 'block';
    }
  }
  el.addEventListener('mousedown', onStart);
  el.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

function applyCocoPeat() {
  const bag = document.getElementById('coco-bag');
  bag.style.transition = 'all 0.3s ease';
  bag.style.opacity = '0'; bag.style.transform = 'scale(0.4)';
  const img = document.getElementById('terrarium-img');
  setTimeout(() => {
    img.style.opacity = '0';
    setTimeout(() => {
      img.src = IMGS['coco_' + gameState.selectedBox];
      img.style.opacity = '1';
      bag.style.display = 'none';
      document.getElementById('drop-hint').style.display = 'none';
      showToast('🌱 코코피트 완료!', '#e8f5e9', '#2e7d32');
      setTimeout(() => { hideToast(); gameState.step++; renderStep(); }, 1200);
    }, 300);
  }, 250);
}

// ===== 은신처 =====
function showHideSelect() {
  setSidePanel(`
    <div class="step-badge">🏡 은신처 꾸미기</div>
    <div class="info-box">
      달팽이는 은신처가 있으면 스트레스를 덜 받고 행복하게 살 수 있습니다.<br>
      달팽이가 숨을 수 있는 은신처를 꾸며주세요.
    </div>
    <div class="panel-title">은신처를 선택해봐요! 🌟</div>
    <div class="hide-grid">
      <div class="hide-option" onclick="selectHide('mushroom',this)">
        <img src="${IMGS.hide_mushroom}" alt="버섯"><span>🍄 버섯</span>
      </div>
      <div class="hide-option" onclick="selectHide('pumpkin',this)">
        <img src="${IMGS.hide_pumpkin}" alt="호박"><span>🎃 호박</span>
      </div>
      <div class="hide-option" onclick="selectHide('coconut',this)">
        <img src="${IMGS.hide_coconut}" alt="코코넛"><span>🥥 코코넛</span>
      </div>
    </div>
    <button class="next-btn" id="hide-next-btn" onclick="confirmHide()" disabled>은신처 설치! 🏠</button>
  `);
}

function selectHide(type, el) {
  document.querySelectorAll('.hide-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  gameState.selectedHide = type;
  document.getElementById('hide-next-btn').disabled = false;
}

function confirmHide() {
  if (!gameState.selectedHide) return;
  const map = { mushroom:'hide_mushroom', pumpkin:'hide_pumpkin', coconut:'hide_coconut' };
  const item = document.getElementById('hide-item');
  item.src = IMGS[map[gameState.selectedHide]];
  item.style.display = 'block';
  showToast('🏠 은신처 완성!', '#e8f5e9', '#2e7d32');
  setTimeout(() => { hideToast(); showCompletionPanel(); }, 1200);
}

function showCompletionPanel() {
  setSidePanel(`
    <div style="text-align:center; padding: 10px 0;">
      <div style="font-size:46px; margin-bottom:8px; animation:snailBounce 2s ease-in-out infinite">🐌</div>
      <div style="font-family:'Jua',sans-serif; font-size:18px; color:#1b5e20; margin-bottom:8px">사육 환경 완성! 🎉</div>
      <div style="font-size:12px; color:#555; line-height:1.8">
        달팽이를 맞이할 준비가 되었어요!<br>다음 단계에서 달팽이 친구를 만나봐요 🌿
      </div>
      <button class="next-btn" style="margin-top:14px" onclick="alert('다음 단계는 곧 업데이트됩니다! 🐌')">달팽이 데려오기 →</button>
    </div>
  `);
  setProgress(STEPS.length);
}

// ===== 유틸 =====
function setSidePanel(html) {
  document.getElementById('side-panel').innerHTML = html;
}

function showToast(text, bg, color) {
  const t = document.getElementById('feedback-toast');
  t.style.cssText = `background:${bg}; color:${color}; display:block;`;
  t.innerHTML = text;
}
function hideToast() {
  document.getElementById('feedback-toast').style.display = 'none';
}
</script>

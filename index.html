<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뱅글뱅글 달팽이 키우기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: #c8e6c9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #game-container {
    position: relative;
    width: min(480px, 100vw);
    height: 100vh;
    max-height: 900px;
    overflow: hidden;
    background: linear-gradient(180deg, #87ceeb 0%, #b8d9f0 35%, #c8e6c9 65%, #a5d6a7 100%);
  }

  /* 장식 나뭇잎 */
  .deco-leaf {
    position: absolute;
    font-size: 22px;
    opacity: 0.35;
    pointer-events: none;
    animation: floatLeaf 6s ease-in-out infinite;
    z-index: 1;
  }
  @keyframes floatLeaf {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(8deg); }
  }

  /* ===== TITLE SCREEN ===== */
  #title-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: linear-gradient(160deg, #e8f5e9, #f1f8e9, #dcedc8);
    z-index: 100;
  }
  .title-snail {
    font-size: 80px;
    animation: snailBounce 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }
  @keyframes snailBounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }
  .game-title {
    font-family: 'Jua', sans-serif;
    font-size: clamp(26px, 6vw, 36px);
    color: #2e7d32;
    text-align: center;
    line-height: 1.3;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
  }
  .game-subtitle {
    font-size: 14px;
    color: #558b2f;
    text-align: center;
    opacity: 0.8;
  }
  .start-btn {
    margin-top: 16px;
    background: #4caf50;
    color: white;
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 6px 0 #388e3c, 0 8px 15px rgba(0,0,0,0.2);
    transition: all 0.1s;
    letter-spacing: 1px;
  }
  .start-btn:hover { transform: translateY(2px); box-shadow: 0 4px 0 #388e3c; }
  .start-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #388e3c; }

  /* ===== GAME SCREEN ===== */
  #game-screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
  }

  /* 진행 바 */
  #progress-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: rgba(255,255,255,0.4);
    z-index: 30;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4caf50, #8bc34a);
    transition: width 0.6s ease;
  }

  /* ===== 레이아웃: 위=사육상자 영역, 아래=패널 ===== */
  /* 패널 높이를 CSS 변수로 관리해서 사육상자 영역이 정확히 남은 공간을 차지 */
  :root { --panel-h: 310px; }

  #scene-area {
    position: absolute;
    top: 0; left: 0; right: 0;
    /* 패널 높이만큼 빼고 남은 공간 전체 */
    bottom: var(--panel-h);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
    z-index: 5;
  }

  /* 사육상자 이미지: scene-area 안에서 꽉 차게 */
  #terrarium-wrap {
    width: 94%;
    max-width: 420px;
    display: none;
    position: relative;
  }
  #terrarium-img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.4s;
  }

  /* 은신처: 사육상자 이미지 위에 절대위치 */
  #hide-item {
    position: absolute;
    /* 사육상자 내부 바닥 중앙에 맞춤 — 퍼센트로 유연하게 */
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 22%;   /* 사육상자 너비 대비 비율 */
    max-width: 90px;
    height: auto;
    display: none;
    animation: itemAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 6;
  }
  @keyframes itemAppear {
    from { transform: translateX(-50%) scale(0) rotate(-15deg); opacity: 0; }
    to   { transform: translateX(-50%) scale(1) rotate(0deg);   opacity: 1; }
  }

  /* ===== 하단 패널 ===== */
  #main-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: var(--panel-h);
    background: rgba(255,255,255,0.97);
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.13);
    padding: 20px 18px 16px;
    overflow-y: auto;
    z-index: 20;
  }

  .step-badge {
    display: inline-block;
    background: #4caf50;
    color: white;
    font-family: 'Jua', sans-serif;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .panel-title {
    font-family: 'Jua', sans-serif;
    font-size: 17px;
    color: #1b5e20;
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .panel-desc {
    font-size: 12px;
    color: #777;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .info-box {
    background: #e8f5e9;
    border-left: 4px solid #4caf50;
    border-radius: 0 10px 10px 0;
    padding: 10px 12px;
    font-size: 13px;
    color: #2e7d32;
    margin-bottom: 12px;
    line-height: 1.6;
  }

  /* 퀴즈 */
  .choices { display: flex; flex-direction: column; gap: 7px; }
  .choice-btn {
    background: #f1f8e9;
    border: 2px solid #c5e1a5;
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 13px;
    color: #33691e;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .choice-btn:hover { background: #dcedc8; border-color: #8bc34a; transform: translateX(3px); }
  .choice-btn.correct { background: #e8f5e9; border-color: #4caf50; color: #1b5e20; animation: correctFlash 0.5s; }
  .choice-btn.wrong   { background: #ffebee; border-color: #ef5350; color: #c62828; animation: shake 0.4s; }

  @keyframes correctFlash {
    0%, 100% { background: #e8f5e9; }
    50% { background: #a5d6a7; }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  /* 사육상자 선택 그리드 */
  .box-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .box-option {
    background: white;
    border: 3px solid #e0e0e0;
    border-radius: 14px;
    padding: 8px 5px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .box-option:hover { border-color: #4caf50; transform: translateY(-3px); box-shadow: 0 5px 14px rgba(76,175,80,0.2); }
  .box-option.selected { border-color: #4caf50; background: #f1f8e9; }
  .box-option img { width: 100%; height: 62px; object-fit: contain; }
  .box-option span { display: block; font-size: 11px; color: #555; margin-top: 3px; }

  /* 은신처 선택 그리드 */
  .hide-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .hide-option {
    background: white;
    border: 3px solid #e0e0e0;
    border-radius: 14px;
    padding: 8px 5px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .hide-option:hover { border-color: #4caf50; transform: translateY(-3px); box-shadow: 0 5px 14px rgba(76,175,80,0.2); }
  .hide-option.selected { border-color: #4caf50; background: #f1f8e9; }
  .hide-option img { width: 100%; height: 62px; object-fit: contain; }
  .hide-option span { display: block; font-size: 11px; color: #555; margin-top: 3px; }

  /* 다음 버튼 */
  .next-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    background: #4caf50;
    color: white;
    border: none;
    padding: 13px;
    border-radius: 12px;
    font-family: 'Jua', sans-serif;
    font-size: 17px;
    cursor: pointer;
    box-shadow: 0 4px 0 #388e3c;
    transition: all 0.1s;
  }
  .next-btn:hover { transform: translateY(2px); box-shadow: 0 2px 0 #388e3c; }
  .next-btn:active { transform: translateY(4px); box-shadow: none; }
  .next-btn:disabled { background: #bdbdbd; box-shadow: 0 4px 0 #9e9e9e; cursor: not-allowed; transform: none; }

  /* 코코피트 봉투 드래그 */
  #coco-bag {
    position: absolute;
    width: 80px;
    cursor: grab;
    z-index: 25;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
    user-select: none;
    display: none;
    touch-action: none;
  }
  #coco-bag:active { cursor: grabbing; }

  #drop-hint {
    position: absolute;
    font-size: 11px;
    color: #5d4037;
    background: rgba(255,255,255,0.92);
    padding: 3px 9px;
    border-radius: 20px;
    pointer-events: none;
    display: none;
    z-index: 26;
    white-space: nowrap;
    font-family: 'Jua', sans-serif;
  }

  /* 피드백 팝업 */
  #feedback-popup {
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 18px;
    padding: 16px 28px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    z-index: 50;
    font-family: 'Jua', sans-serif;
    font-size: 19px;
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: none;
    white-space: nowrap;
  }
  @keyframes popIn {
    from { transform: translateX(-50%) scale(0.4); opacity: 0; }
    to   { transform: translateX(-50%) scale(1);   opacity: 1; }
  }
</style>
</head>
<body>
<div id="game-container">

  <!-- 장식 나뭇잎 -->
  <span class="deco-leaf" style="top:7%;left:5%;animation-delay:0s">🍃</span>
  <span class="deco-leaf" style="top:12%;right:7%;animation-delay:1.5s">🌿</span>
  <span class="deco-leaf" style="top:4%;left:42%;animation-delay:3s">☘️</span>

  <!-- 타이틀 화면 -->
  <div id="title-screen">
    <div class="title-snail">🐌</div>
    <div class="game-title">뱅글뱅글<br>달팽이 키우기</div>
    <div class="game-subtitle">나만의 달팽이 친구를 만들어봐요!</div>
    <button class="start-btn" onclick="startGame()">시작하기 🌿</button>
  </div>

  <!-- 게임 화면 -->
  <div id="game-screen">
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

    <!-- 사육상자 표시 영역 -->
    <div id="scene-area">
      <div id="terrarium-wrap">
        <img id="terrarium-img" src="" alt="사육상자">
        <img id="hide-item" src="" alt="은신처">
      </div>
    </div>

    <!-- 코코피트 봉투 (드래그) -->
    <img id="coco-bag" src="images/코코피트봉투.png" alt="코코피트" draggable="false">
    <div id="drop-hint">📦 사육상자로 드래그!</div>

    <!-- 피드백 팝업 -->
    <div id="feedback-popup"></div>

    <!-- 하단 패널 -->
    <div id="main-panel"></div>
  </div>

</div>

<script>
const IMGS = {
  box_green:    'images/사육상자초록.png',
  box_yellow:   'images/사육상자노랑.png',
  box_blue:     'images/사육상자파랑.png',
  coco_green:   'images/코코피트사육상자초록.png',
  coco_yellow:  'images/코코피트사육상자노랑.png',
  coco_blue:    'images/코코피트사육상자파랑.png',
  hide_mushroom:'images/버섯은신처.png',
  hide_pumpkin: 'images/호박은신처.png',
  hide_coconut: 'images/코코넛은신처.png',
};

let gameState = { step: 0, selectedBox: null, selectedHide: null };
const STEPS = ['quiz1', 'boxSelect', 'quiz2', 'cocopeat', 'hideSelect'];

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  renderStep();
}

function setProgress(n) {
  document.getElementById('progress-fill').style.width = (n / STEPS.length * 100) + '%';
}

// 패널 높이가 바뀔 수 있으니 렌더 후 scene-area bottom 재계산
function syncPanelHeight() {
  const panel = document.getElementById('main-panel');
  const h = panel.offsetHeight;
  document.documentElement.style.setProperty('--panel-h', h + 'px');
}

function renderStep() {
  const step = STEPS[gameState.step];
  setProgress(gameState.step);
  const panel = document.getElementById('main-panel');

  if (step === 'quiz1') {
    panel.innerHTML = `
      <div class="step-badge">📚 퀴즈 1</div>
      <div class="panel-title">달팽이는 어디서 키워야 할까요? 🐌</div>
      <div class="choices">
        <button class="choice-btn" onclick="answerQuiz(this,false)">① 자유롭게 움직일 수 있는 방바닥</button>
        <button class="choice-btn" onclick="answerQuiz(this,true)">② 달팽이가 탈출하지 못하도록 뚜껑이 달린 사육상자</button>
        <button class="choice-btn" onclick="answerQuiz(this,false)">③ 달팽이와 손쉽게 교감할 수 있는 넓은 쟁반</button>
      </div>`;

  } else if (step === 'boxSelect') {
    panel.innerHTML = `
      <div class="step-badge">🏠 사육상자 선택</div>
      <div class="info-box">달팽이가 밖으로 나오지 않도록 뚜껑이 있는 사육상자를 준비합니다.</div>
      <div class="panel-title">어떤 사육상자를 선택할까요?</div>
      <div class="box-grid">
        <div class="box-option" onclick="selectBox('green',this)">
          <img src="${IMGS.box_green}" alt="초록">
          <span>🟢 초록</span>
        </div>
        <div class="box-option" onclick="selectBox('yellow',this)">
          <img src="${IMGS.box_yellow}" alt="노랑">
          <span>🟡 노랑</span>
        </div>
        <div class="box-option" onclick="selectBox('blue',this)">
          <img src="${IMGS.box_blue}" alt="파랑">
          <span>🔵 파랑</span>
        </div>
      </div>
      <button class="next-btn" id="box-next-btn" onclick="confirmBox()" disabled>선택 완료 ✓</button>`;

  } else if (step === 'quiz2') {
    panel.innerHTML = `
      <div class="step-badge">📚 퀴즈 2</div>
      <div class="panel-title">달팽이는 어떤 환경을 좋아할까요? 🌿</div>
      <div class="choices">
        <button class="choice-btn" onclick="answerQuiz(this,false)">① 햇빛이 쨍쨍하고 따뜻하며 건조한 환경</button>
        <button class="choice-btn" onclick="answerQuiz(this,true)">② 그늘지고 따뜻하며 습한 환경</button>
        <button class="choice-btn" onclick="answerQuiz(this,false)">③ 그늘지고 시원하며 습한 환경</button>
      </div>`;

  } else if (step === 'cocopeat') {
    showCocopeatStep();
    return; // syncPanelHeight은 아래서 별도 처리

  } else if (step === 'hideSelect') {
    showHideSelect();
    return;
  }

  requestAnimationFrame(syncPanelHeight);
}

// ===== 퀴즈 =====
function answerQuiz(btn, isCorrect) {
  btn.parentElement.querySelectorAll('.choice-btn').forEach(b => b.style.pointerEvents = 'none');
  if (isCorrect) {
    btn.classList.add('correct');
    btn.innerHTML = '✅ ' + btn.textContent + ' 정답!';
    showFeedback('🎉 정답이에요!', '#e8f5e9', '#2e7d32');
    setTimeout(() => { hideFeedback(); gameState.step++; renderStep(); }, 1400);
  } else {
    btn.classList.add('wrong');
    showFeedback('❌ 다시 생각해봐요!', '#ffebee', '#c62828');
    setTimeout(() => {
      hideFeedback();
      btn.classList.remove('wrong');
      btn.parentElement.querySelectorAll('.choice-btn').forEach(b => b.style.pointerEvents = '');
    }, 900);
  }
}

// ===== 사육상자 선택 =====
function selectBox(color, el) {
  document.querySelectorAll('.box-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  gameState.selectedBox = color;
  document.getElementById('box-next-btn').disabled = false;
}

function confirmBox() {
  if (!gameState.selectedBox) return;
  const wrap = document.getElementById('terrarium-wrap');
  const img  = document.getElementById('terrarium-img');
  img.src = IMGS['box_' + gameState.selectedBox];
  img.style.opacity = '0';
  wrap.style.display = 'block';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { img.style.opacity = '1'; });
  });
  gameState.step++;
  renderStep();
}

// ===== 코코피트 =====
function showCocopeatStep() {
  const panel = document.getElementById('main-panel');
  panel.innerHTML = `
    <div class="step-badge">🌱 바닥재 준비</div>
    <div class="info-box">
      코코피트를 깔아줍시다.<br>
      코코피트는 달팽이가 속으로 파고들 수 있도록 충분한 높이로 깔아주어야 합니다.
    </div>
    <div class="panel-title">코코피트 봉투를 사육상자로 드래그해봐요! 👆</div>
    <div class="panel-desc">봉투를 잡아서 위쪽 사육상자에 가져다 놓으세요</div>`;

  requestAnimationFrame(() => {
    syncPanelHeight();
    // 봉투 위치: scene-area 안 오른쪽
    const bag = document.getElementById('coco-bag');
    const gc  = document.getElementById('game-container').getBoundingClientRect();
    const panelH = document.getElementById('main-panel').offsetHeight;
    const sceneH = gc.height - panelH;
    bag.style.left  = (gc.width * 0.62) + 'px';
    bag.style.top   = (sceneH * 0.45) + 'px';
    bag.style.display = 'block';
    const hint = document.getElementById('drop-hint');
    hint.style.left  = (gc.width * 0.54) + 'px';
    hint.style.top   = (sceneH * 0.34) + 'px';
    hint.style.display = 'block';
    makeDraggable(bag);
  });
}

function makeDraggable(el) {
  let dragging = false, ox, oy;
  function pos(e) { return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }

  function onStart(e) {
    e.preventDefault();
    dragging = true;
    const p = pos(e), r = el.getBoundingClientRect();
    ox = p.x - r.left; oy = p.y - r.top;
    el.style.transition = 'none';
    el.style.zIndex = 40;
    document.getElementById('drop-hint').style.display = 'none';
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = pos(e), cr = document.getElementById('game-container').getBoundingClientRect();
    el.style.left = (p.x - cr.left - ox) + 'px';
    el.style.top  = (p.y - cr.top  - oy) + 'px';
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    const er = el.getBoundingClientRect();
    const cr = document.getElementById('game-container').getBoundingClientRect();
    const panelH = document.getElementById('main-panel').offsetHeight;
    const sceneH = cr.height - panelH;
    const elCY = er.top + er.height / 2 - cr.top;
    if (elCY < sceneH * 0.95) {
      applyCocoPeat();
    } else {
      el.style.transition = 'all 0.4s cubic-bezier(0.34,1.56,0.64,1)';
      el.style.left = (cr.width * 0.62) + 'px';
      el.style.top  = (sceneH * 0.45)   + 'px';
      const hint = document.getElementById('drop-hint');
      hint.style.display = 'block';
    }
  }
  el.addEventListener('mousedown', onStart);
  el.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

function applyCocoPeat() {
  const bag = document.getElementById('coco-bag');
  bag.style.transition = 'all 0.3s ease';
  bag.style.opacity = '0';
  bag.style.transform = 'scale(0.4)';
  const img = document.getElementById('terrarium-img');
  setTimeout(() => {
    img.style.opacity = '0';
    setTimeout(() => {
      img.src = IMGS['coco_' + gameState.selectedBox];
      img.style.opacity = '1';
      bag.style.display = 'none';
      document.getElementById('drop-hint').style.display = 'none';
      showFeedback('🌱 코코피트 완료!', '#e8f5e9', '#2e7d32');
      setTimeout(() => { hideFeedback(); gameState.step++; renderStep(); }, 1200);
    }, 300);
  }, 250);
}

// ===== 은신처 =====
function showHideSelect() {
  const panel = document.getElementById('main-panel');
  panel.innerHTML = `
    <div class="step-badge">🏡 은신처 꾸미기</div>
    <div class="info-box">
      달팽이는 은신처가 있으면 스트레스를 덜 받고 행복하게 살 수 있습니다.<br>
      달팽이가 숨을 수 있는 은신처를 꾸며주세요.
    </div>
    <div class="panel-title">은신처를 선택해봐요! 🌟</div>
    <div class="hide-grid">
      <div class="hide-option" onclick="selectHide('mushroom',this)">
        <img src="${IMGS.hide_mushroom}" alt="버섯">
        <span>🍄 버섯</span>
      </div>
      <div class="hide-option" onclick="selectHide('pumpkin',this)">
        <img src="${IMGS.hide_pumpkin}" alt="호박">
        <span>🎃 호박</span>
      </div>
      <div class="hide-option" onclick="selectHide('coconut',this)">
        <img src="${IMGS.hide_coconut}" alt="코코넛">
        <span>🥥 코코넛</span>
      </div>
    </div>
    <button class="next-btn" id="hide-next-btn" onclick="confirmHide()" disabled>은신처 설치! 🏠</button>`;
  requestAnimationFrame(syncPanelHeight);
}

function selectHide(type, el) {
  document.querySelectorAll('.hide-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  gameState.selectedHide = type;
  document.getElementById('hide-next-btn').disabled = false;
}

function confirmHide() {
  if (!gameState.selectedHide) return;
  const map = { mushroom:'hide_mushroom', pumpkin:'hide_pumpkin', coconut:'hide_coconut' };
  const item = document.getElementById('hide-item');
  item.src = IMGS[map[gameState.selectedHide]];
  item.style.display = 'block';
  showFeedback('🏠 은신처 완성!', '#e8f5e9', '#2e7d32');
  setTimeout(() => { hideFeedback(); showCompletionPanel(); }, 1200);
}

function showCompletionPanel() {
  const panel = document.getElementById('main-panel');
  panel.innerHTML = `
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:50px;margin-bottom:8px;animation:snailBounce 2s ease-in-out infinite">🐌</div>
      <div style="font-family:'Jua',sans-serif;font-size:21px;color:#1b5e20;margin-bottom:7px">사육 환경 완성! 🎉</div>
      <div style="font-size:13px;color:#555;line-height:1.7">
        달팽이를 맞이할 준비가 되었어요!<br>다음 단계에서 달팽이 친구를 만나봐요 🌿
      </div>
      <button class="next-btn" style="margin-top:14px" onclick="alert('다음 단계는 곧 업데이트됩니다! 🐌')">달팽이 데려오기 →</button>
    </div>`;
  setProgress(STEPS.length);
  requestAnimationFrame(syncPanelHeight);
}

// ===== 피드백 =====
function showFeedback(text, bg, color) {
  const p = document.getElementById('feedback-popup');
  p.style.cssText = `background:${bg};color:${color};display:block;`;
  p.innerHTML = text;
}
function hideFeedback() {
  document.getElementById('feedback-popup').style.display = 'none';
}

// 화면 크기 바뀔 때 재계산
window.addEventListener('resize', syncPanelHeight);
</script>
</body>
</html>
